<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A "Normal" Platformer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#7a5010;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh;
  font-family:'Segoe UI',sans-serif;
  user-select:none;
  overflow:hidden;
}
/* fixed game canvas — centered, surrounded by warm bg */
#c {
  display:block;
  width:600px; height:360px;
  flex-shrink:0;
}
/* floating in-game HUD above canvas */
#hud {
  width:600px;
  display:flex; justify-content:space-between; align-items:center;
  padding:6px 4px;
  z-index:5;
  pointer-events:none;
}
#hud span { color:#fff; font-family:'Press Start 2P',monospace; font-size:8px; text-shadow:1px 1px 0 #000; }
#trollmsg {
  color:#ffcc00; font-size:8px; font-weight:700;
  font-family:'Press Start 2P',monospace;
  min-width:200px; text-align:center;
  text-shadow:0 0 8px #ff9900;
}
#controls { display:none; }
/* ESC / pause button — sits top-left of the canvas area */
#pauseBtn {
  position:fixed; top:10px; left:calc(50vw - 300px);
  width:38px; height:38px;
  background:rgba(80,20,0,0.9);
  border:2px solid #c8901a;
  border-radius:6px;
  cursor:pointer; z-index:6;
  display:none;
  align-items:center; justify-content:center;
  font-size:15px;
  transition:background .1s;
}
#pauseBtn:hover { background:rgba(160,50,0,0.95); }
/* pause overlay */
#pauseOverlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.75);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:20;
}
#pauseOverlay h2 {
  font-family:'Press Start 2P',monospace;
  font-size:28px; color:#f0c060;
  text-shadow:3px 3px 0 #5a0a00;
  margin-bottom:32px;
}
.pause-btn {
  font-family:'Press Start 2P',monospace;
  font-size:10px; padding:12px 28px;
  margin:6px;
  background:#f0c060; color:#3a0500;
  border:3px solid #5a0a00;
  box-shadow:3px 3px 0 #3a0500;
  cursor:pointer;
}
.pause-btn:hover { background:#fff8c0; }

/* overlays */
.overlay {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:10;
}
.overlay .sub { font-size:13px; color:#888; margin-bottom:4px; line-height:1.8; text-align:center; }
.overlay .warn { color:#ff4444; font-size:12px; margin-top:4px; }
.btn {
  margin-top:20px; padding:12px 32px;
  background:#fff; color:#000;
  border:none; font-size:13px; font-weight:700;
  cursor:pointer; letter-spacing:1px;
  transition:background .15s, color .15s;
  font-family:'Press Start 2P', monospace;
}
.btn:hover { background:#ffcc00; }
#winOverlay { display:none; }
#winOverlay h1 { color:#00ff99; }
#winDeaths { color:#aaa; font-size:13px; margin-top:8px; }

/* ── START SCREEN ── */
#startOverlay {
  background: linear-gradient(to bottom, #8b1a00 0%, #c45a00 50%, #e8900a 100%);
  overflow:hidden;
}
#startContent {
  position:relative; z-index:2;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  width:100%; height:100%;
  padding-bottom:80px;
}
#startTitle {
  font-family:'Press Start 2P', monospace;
  font-size:52px;
  color:#f0c060;
  text-shadow: 5px 5px 0 #5a0a00, 9px 9px 0 #3a0500;
  letter-spacing:4px;
  margin-bottom:12px;
  text-align:center;
  animation: titleBob 2s ease-in-out infinite;
}
@keyframes titleBob {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-8px); }
}
#startTagline {
  font-family:'Press Start 2P', monospace;
  font-size:9px;
  color:#c07830;
  letter-spacing:2px;
  margin-bottom:48px;
  text-align:center;
}
#startBtn {
  font-size:12px;
  padding:16px 48px;
  background:#f0c060;
  color:#3a0500;
  border:4px solid #5a0a00;
  box-shadow: 5px 5px 0 #3a0500;
  cursor:pointer;
  font-family:'Press Start 2P', monospace;
  transition:transform .08s, box-shadow .08s;
}
#startBtn:hover { transform:translate(-2px,-2px); box-shadow:7px 7px 0 #3a0500; background:#fff8c0; }
#startBtn:active { transform:translate(2px,2px); box-shadow:2px 2px 0 #3a0500; }
#startHint {
  font-family:'Press Start 2P', monospace;
  font-size:7px;
  color:#a06020;
  margin-top:18px;
}
/* spike row at bottom */
#startSpikes {
  position:absolute; bottom:0; left:0; right:0; height:70px;
  width:100%;
}

/* win screen */
#winOverlay { background:rgba(0,0,0,.92); }
#winOverlay h1 {
  font-family:'Press Start 2P', monospace;
  font-size:28px;
  color:#00ff99;
  text-shadow: 3px 3px 0 #005533;
  margin-bottom:12px;
}

/* ── LEVEL SELECT ── */
#levelSelectOverlay {
  background: linear-gradient(to bottom, #8b1a00 0%, #c45a00 50%, #e8900a 100%);
  overflow:hidden;
  align-items:flex-start;
  justify-content:flex-start;
}
#lsSpikes {
  position:absolute; bottom:0; left:0; right:0; height:70px; z-index:3;
  width:100%;
}
#lsHeader {
  position:relative; z-index:2;
  width:100%; padding:28px 0 16px;
  display:flex; align-items:center; justify-content:center; gap:24px;
}
#lsTitle {
  font-family:'Press Start 2P', monospace;
  font-size:20px;
  color:#f0c060;
  text-shadow: 3px 3px 0 #5a0a00;
  letter-spacing:3px;
}
#lsBackBtn {
  font-size:8px; padding:8px 16px;
  background:#f0c060; color:#3a0500;
  border:3px solid #5a0a00;
  box-shadow:3px 3px 0 #3a0500;
  font-family:'Press Start 2P', monospace;
  cursor:pointer;
}
#lsBackBtn:hover { background:#fff8c0; }
/* scrollable path area */
#lsScroll {
  position:relative; z-index:2;
  width:100%; flex:1;
  overflow-y:auto; overflow-x:hidden;
  padding-bottom:90px;
}
#lsScroll::-webkit-scrollbar { width:6px; }
#lsScroll::-webkit-scrollbar-track { background:rgba(0,0,0,0.2); }
#lsScroll::-webkit-scrollbar-thumb { background:#5a0a00; border-radius:3px; }
/* the SVG path canvas */
#lsPathCanvas {
  display:block;
  position:absolute; top:0; left:0;
  pointer-events:none;
}
#lsPath {
  position:relative;
  width:100%;
}
/* individual door nodes on the path */
.ls-node {
  position:absolute;
  display:flex; flex-direction:column;
  align-items:center;
  cursor:pointer;
  transition:transform .1s;
}
.ls-node:hover:not(.locked) { transform:translateY(-4px) scale(1.08); }
.ls-node.locked { cursor:default; opacity:0.45; }
.ls-door-svg { width:48px; height:62px; }
.ls-node-num {
  font-family:'Press Start 2P', monospace;
  font-size:7px;
  color:#f0c060;
  margin-top:3px;
  text-shadow:1px 1px 0 #3a0500;
}
.ls-node.beaten .ls-node-num { color:#88ff66; }
.ls-node.locked .ls-node-num { color:#8a6030; }
</style>
</head>
<body>

<div class="overlay" id="startOverlay">
  <!-- spike row at bottom -->
  <svg id="startSpikes" viewBox="0 0 1200 70" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="0,70 0,30 30,70 60,0 90,70 120,10 150,70 180,5 210,70 240,15 270,70 300,2 330,70 360,12 390,70 420,8 450,70 480,18 510,70 540,4 570,70 600,14 630,70 660,6 690,70 720,16 750,70 780,3 810,70 840,11 870,70 900,7 930,70 960,17 990,70 1020,5 1050,70 1080,13 1110,70 1140,9 1170,70 1200,4 1200,70" fill="#5a0a00"/>
  </svg>
  <div id="startContent">
    <div id="startTitle">FLOOR LIED</div>
    <div id="startTagline">a &ldquo;normal&rdquo; platformer</div>
    <button class="btn" id="startBtn">▶ PLAY</button>
    <div id="startHint">← → MOVE &nbsp;&nbsp; ↑ / SPACE JUMP</div>
  </div>
</div>

<div class="overlay" id="winOverlay" style="display:none;">
  <h1>YOU WIN!</h1>
  <div class="sub" style="color:#aaa;font-family:'Press Start 2P',monospace;font-size:9px;line-height:2;">You actually made it.<br>Honestly didn't expect that.</div>
  <div id="winDeaths" style="color:#888;font-size:11px;margin-top:10px;font-family:'Press Start 2P',monospace;"></div>
  <button class="btn" id="restartBtn" style="margin-top:24px;">LEVEL SELECT</button>
</div>

<div class="overlay" id="levelSelectOverlay" style="display:none;">
  <svg id="lsSpikes" viewBox="0 0 1200 70" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="0,70 0,30 30,70 60,0 90,70 120,10 150,70 180,5 210,70 240,15 270,70 300,2 330,70 360,12 390,70 420,8 450,70 480,18 510,70 540,4 570,70 600,14 630,70 660,6 690,70 720,16 750,70 780,3 810,70 840,11 870,70 900,7 930,70 960,17 990,70 1020,5 1050,70 1080,13 1110,70 1140,9 1170,70 1200,4 1200,70" fill="#5a0a00"/>
  </svg>
  <div id="lsHeader">
    <button id="lsBackBtn">← BACK</button>
    <div id="lsTitle">SELECT LEVEL</div>
  </div>
  <div id="lsScroll">
    <div id="lsPath">
      <canvas id="lsPathCanvas"></canvas>
    </div>
  </div>
</div>

<canvas id="c"></canvas>

<!-- floating HUD -->
<div id="hud">
  <span id="levelName">LEVEL 1</span>
  <span id="trollmsg"></span>
  <span>DEATHS: <span id="deathNum">0</span></span>
</div>

<!-- pause button (top-left, shown during gameplay) -->
<button id="pauseBtn" title="Pause (ESC)">⏸</button>

<!-- pause menu -->
<div id="pauseOverlay">
  <h2>PAUSED</h2>
  <button class="pause-btn" id="pauseResumeBtn">▶ RESUME</button>
  <button class="pause-btn" id="pauseLevelsBtn">SELECT LEVEL</button>
  <button class="pause-btn" id="pauseRestartBtn">↺ RESTART</button>
</div>

<div id="controls"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 600; canvas.height = 360;
const W = 600, H = 360;

// ─── state ────────────────────────────────────────────────────────────────────
let totalDeaths = 0;
let curLevel = 0;
let gameActive = false;
let frame = 0;
let trollTimeout = null;

// ─── input ────────────────────────────────────────────────────────────────────
const K = {};
document.addEventListener('keydown', e => { K[e.code] = true; });
document.addEventListener('keyup',   e => { K[e.code] = false; });
const left  = () => K['ArrowLeft']  || K['KeyA'];
const right = () => K['ArrowRight'] || K['KeyD'];
const jump  = () => K['ArrowUp']    || K['KeyW'] || K['Space'];

// ─── player ───────────────────────────────────────────────────────────────────
let p = {};
function spawnPlayer(x, y) {
  p = { x, y, w:18, h:24, vx:0, vy:0, grounded:false, dead:false, deadTimer:0 };
}

// ─── troll messages ───────────────────────────────────────────────────────────
const msgs = ["lol","nice try","skill issue","trust nobody","you good?","bro...",
  "the floor said no","didn't see that?","classic","almost!","close one",
  "it looked safe though","gravity is just a suggestion","read the room",
  "maybe slow down","you'll get it","eventually","🤡","the door moved lol",
  "what if i told you","that was on purpose","oops","heh","nah","frfr"];
function troll(msg) {
  clearTimeout(trollTimeout);
  const el = document.getElementById('trollmsg');
  el.textContent = msg || msgs[Math.floor(Math.random()*msgs.length)];
  trollTimeout = setTimeout(() => el.textContent = '', 2500);
}

// ─── level definitions ────────────────────────────────────────────────────────
function makeLevels() {
  return [

    // ── 1: Floor looks fine — one hole punches open mid-run ──────────────────
    {
      name:"1 - JUST WALK",
      bg:'#e8a84a',
      spawn:[30,290],
      door:[548,290],
      platforms:[
        {x:0,   y:320, w:600, h:200},
      ],
      traps:[
        { trigger:'playerX', val:240, fired:false,
          action:'removeFloorChunk', cx:280, cw:70, msg:"the floor said no" }
      ],
    },

    // ── 2: Ceiling drops ──────────────────────────────────────────────────────
    {
      name:"2 - LOW CEILING",

    // ── 3: Collapse tile ──────────────────────────────────────────────────────
    {
      name:"3 - NORMAL FLOOR",
      bg:'#e8a84a',

        {x:250, y:320, w:55,  h:200, special:'collapse', collapseTimer:-1},
        {x:325, y:320, w:275, h:200},

      traps:[],
    },

    // ── 4: Gap + wall spike ───────────────────────────────────────────────────
    {

    {

    // ── 6: Teleport pad ───────────────────────────────────────────────────────
    {

    // ── 8: Sliding platform ───────────────────────────────────────────────────

    // ── 11: Platform spike from above ────────────────────────────────────────
    {
      name:"11 - CHOOSE WISELY",
      bg:'#e8a84a',
      spawn:[30,200],
      door:[548,200],
      platforms:[

    // ── 13: Coins reveal spikes ───────────────────────────────────────────────

      ],

          action:'activateWall', idx:0, speed:-1.2, msg:"keep going!" }

    // ── 16: Collapse bridges ──────────────────────────────────────────────────
    {
      name:"16 - FLOATING ISLAND",
      bg:'#e8a84a',
      spawn:[30,270],
      door:[548,268],
      platforms:[
        {x:0,   y:300, w:120, h:20},
        {x:155, y:280, w:105, h:16, special:'collapse', collapseTimer:-1},

// ─── level runtime state ──────────────────────────────────────────────────────
let lvl = null;
let levelData = null;
let flipControls = false;
let gravFlipped = false;
let gravFlipUsed = false;
let flashRevealTimer = 0;

function loadLevel(idx) {
  const defs = makeLevels();
  if (idx >= defs.length) { showWin(); return; }
  levelData = defs[idx];
  lvl = JSON.parse(JSON.stringify(levelData));
  flipControls = false;
  gravFlipped = false;
  gravFlipUsed = false;
  flashRevealTimer = 0;
  frame = 0;
  spawnPlayer(lvl.spawn[0], lvl.spawn[1]);
  document.getElementById('levelName').textContent = `LEVEL ${lvl.name}`;
}

function showWin() {
  gameActive = false;
  document.getElementById('winOverlay').style.display = 'flex';
  document.getElementById('winDeaths').textContent = `Total deaths: ${totalDeaths}`;
}

// ─── collision helpers ────────────────────────────────────────────────────────
function overlaps(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
function rectRect(a,b) {
  return overlaps(a.x,a.y,a.w,a.h, b.x,b.y,b.w,b.h);
}
function playerRect() { return {x:p.x,y:p.y,w:p.w,h:p.h}; }

// ─── death ────────────────────────────────────────────────────────────────────
function die(msg) {
  if (p.dead) return;
  p.dead = true; p.deadTimer = 45;
  totalDeaths++;
  document.getElementById('deathNum').textContent = totalDeaths;
  troll(msg);
  setTimeout(() => loadLevel(curLevel), 600);
}

// ─── trap execution ───────────────────────────────────────────────────────────
function fireTrap(trap) {
  trap.fired = true;
  const action = trap.action;

  if (action === 'removeFloorChunk') {
    lvl.platforms = lvl.platforms.filter(pl =>
      !(pl.y >= 310 && pl.x >= trap.cx && pl.x <= trap.cx + trap.cw)
    );
    const orig = lvl.platforms.find(pl => pl.y === 320 && pl.w === 600);
    if (orig) {
      lvl.platforms = lvl.platforms.filter(p => p !== orig);
      lvl.platforms.push({x:0,     y:320, w:trap.cx,         h:40});
      lvl.platforms.push({x:trap.cx+trap.cw, y:320, w:600-(trap.cx+trap.cw), h:40});
    }
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'ceilingDrop') {
    lvl._ceilingY = 0;
    lvl._ceilingTargetY = trap.targetY;
    lvl._ceilingDropping = true;
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'activateWallSpike') {
    lvl.wallSpikes[trap.idx].active = true;
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'dropSpike') {
    if (lvl.dropSpikes && lvl.dropSpikes[trap.idx]) {
      lvl.dropSpikes[trap.idx].active = true;
      if (trap.msg) troll(trap.msg);
    }
  }

  if (action === 'startSlide') {
    const pl = lvl.platforms[trap.idx];
    if (pl) { pl._sliding = true; pl._slideSpeed = trap.speed; }
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'reverseFloor') {
    flipControls = !flipControls;
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'flipControls') {
    flipControls = !flipControls;
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'moveDoor') {
    lvl.door[0] = trap.newX; lvl.door[1] = trap.newY;
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'collapseFloor') {
    const pl = lvl.platforms[trap.platIdx];
    if (pl) { pl.special = 'collapse'; pl.collapseTimer = 30; }
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'spikeFromAbove') {
    lvl._fallingSpike = {x:trap.tx, y:trap.ty, w:trap.tw, h:trap.th, vy:trap.speed, color:'#7a5010'};
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'floorSlide') {
    lvl.platforms.forEach(pl => { if(pl.y===320) { pl._slideRight = true; pl._slideSpeed = trap.speed; } });
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'revealSpikes') {
    if (lvl.hiddenSpikes) lvl.hiddenSpikes.forEach(s => s.revealed = true);
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'activateWall') {
    lvl.movingWalls[trap.idx].active = true;
    lvl.movingWalls[trap.idx].vx = trap.speed;
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'flashReveal') {
    flashRevealTimer = trap.duration;
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'gravityFlip') {
    gravFlipped = !gravFlipped;
    if (trap.msg) troll(trap.msg);
  }
}

// ─── update ───────────────────────────────────────────────────────────────────
function update() {
  if (!gameActive || !p || p.dead) return;
  frame++;

  const GRAV  = gravFlipped ? -0.5 : 0.5;
  const JSPD  = gravFlipped ?  10  : -10;
  const SPEED = 3.4;

  // movement
  const goLeft  = flipControls ? right() : left();
  const goRight = flipControls ? left()  : right();

  if (goLeft)  p.vx = -SPEED;
  else if (goRight) p.vx = SPEED;
  else p.vx *= 0.78;

  if (jump() && p.grounded) { p.vy = JSPD; p.grounded = false; }

  p.vy += GRAV;
  if (Math.abs(p.vy) > 16) p.vy = Math.sign(p.vy)*16;

  p.x += p.vx;
  p.y += p.vy;
  p.grounded = false;

  // ── platform collisions ──────────────────────────────────────────────────
  for (let i = 0; i < lvl.platforms.length; i++) {
    const pl = lvl.platforms[i];
    if (pl._gone) continue;
    if (pl.invisible && flashRevealTimer <= 0) continue;

    // slide platform
    if (pl._sliding) {
      pl.x += pl._slideSpeed;
      if (pl.x > lvl._slideMaxX || pl.x > 700) pl._slideSpeed = 0;
    }
    if (pl._slideRight) {
      pl.x += pl._slideSpeed;
      if (pl.x > 700) pl._gone = true;
    }

    // deadly floor
    if (pl.deadly) {
      if (overlaps(p.x,p.y,p.w,p.h, pl.x,pl.y,pl.w,pl.h)) { die(); return; }
      continue;
    }

    if (!overlaps(p.x,p.y,p.w,p.h, pl.x,pl.y,pl.w,pl.h)) continue;

    const overX = Math.min(p.x+p.w,pl.x+pl.w) - Math.max(p.x,pl.x);
    const overY = Math.min(p.y+p.h,pl.y+pl.h) - Math.max(p.y,pl.y);

    if (overX < overY) {
      p.x += p.x < pl.x ? -overX : overX; p.vx = 0;
    } else {
      if (!gravFlipped) {
        if (p.vy >= 0 && p.y+p.h <= pl.y+pl.h+4) {
          p.y = pl.y - p.h; p.vy = 0; p.grounded = true;
          if (pl.special === 'collapse') {
            if (pl.collapseTimer < 0) pl.collapseTimer = 38;
          }
          lvl.traps && lvl.traps.forEach(t => {
            if (!t.fired && t.trigger === 'playerStandOn' && t.platIdx === i) fireTrap(t);
          });
        } else if (p.vy < 0) { p.y = pl.y+pl.h; p.vy = 0; }
      } else {
        if (p.vy <= 0 && p.y >= pl.y-4) {
          p.y = pl.y+pl.h; p.vy = 0; p.grounded = true;
          if (pl.special === 'collapse' && pl.collapseTimer < 0) pl.collapseTimer = 38;
        } else if (p.vy > 0) { p.y = pl.y-p.h; p.vy = 0; }
      }
    }
  }

  // collapse timers
  lvl.platforms.forEach(pl => {
    if (pl.special === 'collapse' && pl.collapseTimer > 0) {
      pl.collapseTimer--;
      if (pl.collapseTimer === 0) pl._gone = true;
    }
  });

  // ── invisible pit death ──────────────────────────────────────────────────
  if (lvl.invisPits) {
    for (const pit of lvl.invisPits) {
      if (overlaps(p.x,p.y,p.w,p.h, pit.x,pit.y,pit.w,pit.h)) { die("surprise hole"); return; }
    }
  }

  // ── teleport pads ────────────────────────────────────────────────────────
  if (lvl.teleportPads) {
    for (const tp of lvl.teleportPads) {
      if (overlaps(p.x,p.y,p.w,p.h, tp.x,tp.y,tp.w,tp.h)) {
        p.x = tp.destX; p.y = tp.destY; p.vx = 0; p.vy = 0;
        troll(tp.msg || "teleported lol");
      }
    }
  }

  // ── ceiling drop ─────────────────────────────────────────────────────────
  if (lvl._ceilingDropping) {
    lvl._ceilingY = (lvl._ceilingY || 0) + 5;
    if (lvl._ceilingY >= lvl._ceilingTargetY) { lvl._ceilingY = lvl._ceilingTargetY; lvl._ceilingDropping = false; }
    const cy = lvl._ceilingY;
    if (overlaps(p.x,p.y,p.w,p.h, 0,cy,W,20)) { die("ceiling says hi"); return; }
  }

  // ── drop spikes ──────────────────────────────────────────────────────────
  if (lvl.dropSpikes) {
    for (const ds of lvl.dropSpikes) {
      if (!ds.active || ds.fallen) continue;
      ds.vy += 0.85; ds.y += ds.vy;
      if (ds.y > 360) { ds.fallen = true; continue; }
      if (overlaps(p.x+2,p.y+2,p.w-4,p.h-4, ds.x,ds.y,ds.w,ds.h)) { die(); return; }
      if (ds.y + ds.h >= 320) { ds.y = 300; ds.vy = 0; ds.fallen = true; }
    }
  }

  // ── wall spikes ──────────────────────────────────────────────────────────
  if (lvl.wallSpikes) {
    for (const ws of lvl.wallSpikes) {
      if (!ws.active || ws.done) continue;
      ws.x += ws.vx;
      if (ws.x > W+10 || ws.x+ws.w < -10) { ws.done = true; continue; }
      if (overlaps(p.x+1,p.y+1,p.w-2,p.h-2, ws.x,ws.y,ws.w,ws.h)) { die(); return; }
    }
  }

  // ── moving walls ─────────────────────────────────────────────────────────
  if (lvl.movingWalls) {
    for (const mw of lvl.movingWalls) {
      if (!mw.active) continue;
      mw.x += mw.vx;
      if (overlaps(p.x,p.y,p.w,p.h, mw.x,mw.y,mw.w,mw.h)) { die("squished"); return; }
    }
  }

  // ── falling spike from above ─────────────────────────────────────────────
  if (lvl._fallingSpike) {
    const fs = lvl._fallingSpike;
    fs.y += fs.vy;
    if (overlaps(p.x+2,p.y+2,p.w-4,p.h-4, fs.x,fs.y,fs.w,fs.h)) { die(); return; }
    if (fs.y > 400) lvl._fallingSpike = null;
  }

  // ── floor spikes (static) ────────────────────────────────────────────────
  if (lvl.floorSpikes) {
    for (const fs of lvl.floorSpikes) {
      if (fs.deadly && overlaps(p.x,p.y+p.h-2,p.w,4, fs.x,fs.y,fs.w,fs.h)) { die(); return; }
    }
  }

  // ── hidden spikes revealed ────────────────────────────────────────────────
  if (lvl.hiddenSpikes) {
    for (const hs of lvl.hiddenSpikes) {
      if (hs.revealed && overlaps(p.x+2,p.y+2,p.w-4,p.h-4, hs.x,hs.y,hs.w,hs.h)) { die(); return; }
    }
  }

  // ── jump pads ────────────────────────────────────────────────────────────
  if (lvl.jumpPads) {
    for (const jp of lvl.jumpPads) {

      // launch player when they step on pad
      if (overlaps(p.x,p.y+p.h-2,p.w,4, jp.x,jp.y,jp.w,jp.h) && p.vy >= 0) {
        p.vy = jp.boost;

        // GREEN: no spike visible yet. Once player is launched and gets near ceiling,
        // spike slides down from ceiling, kills them, then disappears.
        if (jp.triggersSpike && !jp.ceilSpike._triggered) {
          jp.ceilSpike._triggered = true;
          jp.ceilSpike._state = 'waiting'; // waiting for player to reach top
        }

        // RED: spike is always at ceiling. When player touches pad and launches up,
        // spike slides UP out of the way, then comes back down after a pause.
        if (jp.redPad && jp.ceilSpike._state !== 'retracting' && jp.ceilSpike._state !== 'gone' && jp.ceilSpike._state !== 'returning') {
          jp.ceilSpike._state = 'retracting';
          troll("wait...");
        }
      }

      // GREEN spike state machine
      if (jp.triggersSpike && jp.ceilSpike._triggered) {
        if (jp.ceilSpike._state === 'waiting' && p.y < 80) {
          // player near ceiling — spike appears and slides down
          jp.ceilSpike.y = 20;
          jp.ceilSpike._state = 'sliding_down';
          jp.ceilSpike.active = true;
        }
        if (jp.ceilSpike._state === 'sliding_down') {
          jp.ceilSpike.y += 2.0;
          if (jp.ceilSpike.y >= 280) {
            jp.ceilSpike.y = 280;
            jp.ceilSpike._state = 'done';
            // disappear after a moment
            setTimeout(() => {
              jp.ceilSpike.active = false;
              jp.ceilSpike.y = -200;
              jp.ceilSpike._triggered = false;
              jp.ceilSpike._state = 'idle';
            }, 1200);
          }
        }
      }

      // RED spike state machine — spike always visible at ceiling when idle
      if (jp.redPad) {
        if (!jp.ceilSpike._state) jp.ceilSpike._state = 'idle';

        if (jp.ceilSpike._state === 'retracting') {
          jp.ceilSpike.y -= 3;
          if (jp.ceilSpike.y + jp.ceilSpike.h < 0) {
            jp.ceilSpike.y = -jp.ceilSpike.h;
            jp.ceilSpike._state = 'gone';
            jp.ceilSpike._timer = 90;
            troll("huh?");
          }
        }
        if (jp.ceilSpike._state === 'gone') {
          jp.ceilSpike._timer--;
          if (jp.ceilSpike._timer <= 0) {
            jp.ceilSpike._state = 'returning';
            troll("it's back");
          }
        }
        if (jp.ceilSpike._state === 'returning') {
          jp.ceilSpike.y += 2;
          if (jp.ceilSpike.y >= 20) {
            jp.ceilSpike.y = 20;
            jp.ceilSpike._state = 'idle';
          }
        }
      }

      // collision — only when spike is on screen and active
      if (jp.ceilSpike && jp.ceilSpike.active && jp.ceilSpike.y >= 0) {
        if (overlaps(p.x+2,p.y+2,p.w-4,p.h-4, jp.ceilSpike.x,jp.ceilSpike.y,jp.ceilSpike.w,jp.ceilSpike.h)) {
          die("ow"); return;
        }
      }
    }
  }


  // ── coins ─────────────────────────────────────────────────────────────────
  if (lvl.coins) {
    lvl.coins.forEach((c, i) => {
      if (!c.alive) return;
      if (overlaps(p.x,p.y,p.w,p.h, c.x-c.r,c.y-c.r,c.r*2,c.r*2)) {
        c.alive = false;
        lvl.traps && lvl.traps.forEach(t => {
          if (!t.fired && t.trigger === 'coinCollect' && t.coinIdx === i) fireTrap(t);
        });
      }
    });
  }

  // ── bounds death ─────────────────────────────────────────────────────────
  if (p.y > H + 50)  { die("into the void"); return; }
  if (p.y < -80)     { die("too high!"); return; }
  if (p.x < -40 || p.x > W+40) { die(); return; }

  // ── trigger traps by playerX (right direction) ───────────────────────────
  if (lvl.traps) {
    for (const t of lvl.traps) {
      if (t.fired) continue;
      if (t.trigger === 'playerX' && p.x+p.w/2 >= t.val) fireTrap(t);
      // fires when player walks left close to the moved door — only after door has moved
      if (t.trigger === 'playerXBelow_afterDoor' && lvl.door[0] < 100 && p.x+p.w/2 <= t.val) fireTrap(t);
    }
  }

  // ── flash reveal timer ───────────────────────────────────────────────────
  if (flashRevealTimer > 0) flashRevealTimer--;

  // ── door check ───────────────────────────────────────────────────────────
  const [dx, dy] = lvl.door;
  if (overlaps(p.x,p.y,p.w,p.h, dx,dy,26,38)) {
    markLevelBeaten(curLevel);
    curLevel++;
    loadLevel(curLevel);
  }
}

// ─── draw ─────────────────────────────────────────────────────────────────────
const PLAT_COLORS = {
  default: '#7a5010',
  collapse: '#7a5010',
  slideRight: '#4080a0',
  deadly: '#cc3344',
  slippery: '#80b0d0',
};

function drawPlatform(pl) {
  if (pl._gone) return;
  let col = PLAT_COLORS.default;
  if (pl.color) col = pl.color;
  if (pl.special === 'collapse') {
    col = PLAT_COLORS.collapse;
    if (pl.collapseTimer > 0) {
      ctx.save();
      ctx.translate((Math.random()-.5)*3, 0);
    }
  }
  if (pl.slippery) col = PLAT_COLORS.slippery;
  if (pl.deadly && !pl.color) col = '#cc3344';
  if (pl.invisible) {
    if (flashRevealTimer > 0) {
      ctx.globalAlpha = 0.4 + 0.6*(flashRevealTimer/60);
      col = '#8080ff';
    } else {
      ctx.globalAlpha = 0;
    }
  }
  ctx.fillStyle = col;
  ctx.fillRect(Math.round(pl.x), Math.round(pl.y), pl.w, pl.h);
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(Math.round(pl.x), Math.round(pl.y), pl.w, 3);
  ctx.globalAlpha = 1;
  if (pl.special === 'collapse' && pl.collapseTimer > 0) ctx.restore();
}

function drawSpikeTri(x, y, w, h, color, pointUp) {
  ctx.fillStyle = color;
  const count = Math.max(1, Math.floor(w/12));
  const tw = w / count;
  for (let i = 0; i < count; i++) {
    ctx.beginPath();
    if (pointUp) {
      ctx.moveTo(x+i*tw,   y+h);
      ctx.lineTo(x+i*tw+tw/2, y);
      ctx.lineTo(x+i*tw+tw, y+h);
    } else {
      ctx.moveTo(x+i*tw,   y);
      ctx.lineTo(x+i*tw+tw/2, y+h);
      ctx.lineTo(x+i*tw+tw, y);
    }
    ctx.closePath();
    ctx.fill();
  }
}

function drawDoor(x, y) {
  ctx.fillStyle = '#cc9944';
  ctx.fillRect(x, y, 26, 38);
  ctx.fillStyle = '#664400';
  ctx.fillRect(x+3, y+3, 20, 35);
  ctx.fillStyle = '#ffcc66';
  ctx.fillRect(x, y, 26, 4);
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath();
  ctx.arc(x+19, y+22, 3, 0, Math.PI*2);
  ctx.fill();
}

function drawPlayer() {
  if (p.dead) {
    ctx.globalAlpha = Math.max(0, p.deadTimer/45);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(Math.round(p.x-3), Math.round(p.y-3), p.w+6, p.h+6);
    ctx.globalAlpha = 1;
    p.deadTimer--;
    return;
  }
  const px = Math.round(p.x), py = Math.round(p.y);
  ctx.fillStyle = '#e8d5b0';
  ctx.fillRect(px, py, p.w, p.h);
  ctx.fillStyle = '#222';
  ctx.fillRect(px+(p.vx>=0?10:4), py+6, 3, 3);
  ctx.fillStyle = '#a06030';
  ctx.fillRect(px+(p.vx>=0?8:3), py+14, 6, 2);
  const lp = Math.abs(p.vx)>.5 ? Math.sin(frame*.3)*3 : 0;
  ctx.fillStyle = '#4466aa';
  ctx.fillRect(px+2,   py+p.h, 6, 4+lp);
  ctx.fillRect(px+p.w-8, py+p.h, 6, 4-lp);
}

function render() {
  if (!lvl) return;
  ctx.fillStyle = lvl.bg || '#1a1a2e';
  ctx.fillRect(0,0,W,H);

  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  if (lvl.extraRects) {
    for (const r of lvl.extraRects) {
      ctx.fillStyle = r.color || '#333';
      ctx.fillRect(r.x, r.y, r.w, r.h);
    }
  }

  if (lvl._ceilingY !== undefined && lvl._ceilingY >= 0) {
    ctx.fillStyle = '#cc3344';
    ctx.fillRect(0, lvl._ceilingY, W, 20);
  }

  lvl.platforms.forEach(drawPlatform);

  if (lvl.invisPits) {
    for (const pit of lvl.invisPits) {
      ctx.fillStyle = '#4060a0';
      ctx.fillRect(pit.x, pit.y, pit.w, pit.h);
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      ctx.fillRect(pit.x, pit.y, pit.w, 3);
    }
  }

  if (lvl.hiddenSpikes) {
    for (const hs of lvl.hiddenSpikes) {
      if (!hs.revealed) continue;
      drawSpikeTri(hs.x, hs.y, hs.w, hs.h, hs.color, true);
    }
  }

  if (lvl.floorSpikes) {
    for (const fs of lvl.floorSpikes) {
      if (!fs.deadly) continue;
      ctx.fillStyle = fs.color || '#cc3344';
      ctx.fillRect(fs.x, fs.y, fs.w, fs.h);
    }
  }

  if (lvl.jumpPads) {
    for (const jp of lvl.jumpPads) {
      ctx.fillStyle = jp.color;
      ctx.fillRect(jp.x, jp.y, jp.w, jp.h);
      // draw ceiling spike
      if (jp.ceilSpike) {
        // red pad: always draw spike as long as it's on screen (even while retracting/returning)
        // green pad: only draw once triggered
        // red: draw whenever on screen; green: only draw once triggered (spike moved to ceiling)
        const shouldDraw = jp.redPad
          ? (jp.ceilSpike.y > -jp.ceilSpike.h - 5)
          : (jp.ceilSpike.active && jp.ceilSpike.y >= 0);
        if (shouldDraw) {
          drawSpikeTri(jp.ceilSpike.x, jp.ceilSpike.y, jp.ceilSpike.w, jp.ceilSpike.h, jp.ceilSpike.color, false);
        }
      }
    }
  }

  if (lvl.dropSpikes) {
    for (const ds of lvl.dropSpikes) {
      if (!ds.active) continue;
      drawSpikeTri(ds.x, ds.y, ds.w, ds.h, ds.color, true);
    }
  }

  if (lvl.wallSpikes) {
    for (const ws of lvl.wallSpikes) {
      if (!ws.active || ws.done) continue;
      ctx.fillStyle = ws.color;
      ctx.fillRect(Math.round(ws.x), ws.y, ws.w, ws.h);
    }
  }

  if (lvl.movingWalls) {
    for (const mw of lvl.movingWalls) {
      ctx.fillStyle = mw.color || '#cc3344';
      ctx.fillRect(Math.round(mw.x), mw.y, mw.w, mw.h);
    }
  }

  if (lvl._fallingSpike) {
    const fs = lvl._fallingSpike;
    ctx.fillStyle = fs.color;
    ctx.fillRect(fs.x, Math.round(fs.y), fs.w, fs.h);
  }

  if (lvl.teleportPads) {
    for (const tp of lvl.teleportPads) {
      ctx.fillStyle = '#aa44ff';
      ctx.fillRect(tp.x, tp.y, tp.w, tp.h);
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(tp.x, tp.y, tp.w, 3);
    }
  }

  if (lvl.coins) {
    ctx.fillStyle = '#ffcc00';
    for (const c of lvl.coins) {
      if (!c.alive) continue;
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#fff8cc';
      ctx.beginPath();
      ctx.arc(c.x-2, c.y-2, c.r*.4, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#ffcc00';
    }
  }

  const [dx,dy] = lvl.door;
  drawDoor(dx, dy);

  if (gravFlipped) {
    ctx.fillStyle = 'rgba(0,200,255,0.06)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#00aaff';
    ctx.font = '10px monospace';
    ctx.fillText('▲ gravity flipped ▲', 10, H-10);
  }

  if (flipControls && frame < 200) {
    ctx.fillStyle = 'rgba(255,100,0,0.5)';
    ctx.font = '9px monospace';
    ctx.fillText('controls: normal', 10, H-10);
  }

  drawPlayer();
}

// ─── loop ─────────────────────────────────────────────────────────────────────
function loop() {
  if (!paused) {
    update();
    render();
  }
  if (gameActive) requestAnimationFrame(loop);
}

// ─── save / progress ─────────────────────────────────────────────────────────
const SAVE_KEY = 'normalPlatformerProgress';
let maxUnlocked = 0; // highest level index unlocked (0 = level 1 available)

function saveProgress() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify({maxUnlocked})); } catch(e){}
}
function loadProgress() {
  try {
    const d = JSON.parse(localStorage.getItem(SAVE_KEY)||'{}');
    maxUnlocked = d.maxUnlocked || 0;
  } catch(e){ maxUnlocked = 0; }
}
function markLevelBeaten(idx) {
  if (idx >= maxUnlocked) { maxUnlocked = idx + 1; saveProgress(); }
}
loadProgress();

// ─── level select — winding path style ───────────────────────────────────────
function doorSVG(beaten, locked) {
  const frameCol = locked ? '#4a3020' : beaten ? '#60aa20' : '#c8901a';
  const innerCol = locked ? '#1a0e04' : beaten ? '#1a3a08' : '#3a1a08';
  const knobCol  = locked ? '#4a3020' : '#f0c060';
  return `<svg class="ls-door-svg" viewBox="0 0 48 62" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="10" width="44" height="50" rx="18" ry="18" fill="${frameCol}"/>
    <rect x="7" y="15" width="34" height="45" rx="13" ry="13" fill="${innerCol}"/>
    ${beaten ? '<text x="24" y="40" text-anchor="middle" font-size="18" fill="#88ff66">✓</text>' : ''}
    <circle cx="36" cy="36" r="3.5" fill="${knobCol}"/>
  </svg>`;
}

function buildLevelSelect() {
  const defs = makeLevels();
  const path = document.getElementById('lsPath');
  const cvs  = document.getElementById('lsPathCanvas');
  path.innerHTML = '';
  path.appendChild(cvs); // keep canvas

  const vw = window.innerWidth;
  const COLS = 5;
  const ROW_H = 130;
  const NODE_W = 70;
  const rows = Math.ceil(defs.length / COLS);
  const totalH = rows * ROW_H + 60;

  path.style.height = totalH + 'px';
  cvs.width = vw;
  cvs.height = totalH;

  // compute node positions in snake pattern (like Level Devil)
  const positions = [];
  const padX = (vw - COLS * NODE_W) / (COLS + 1);
  for (let i = 0; i < defs.length; i++) {
    const row = Math.floor(i / COLS);
    const col = i % COLS;
    // snake: even rows go left→right, odd rows go right→left
    const dir = row % 2 === 0 ? col : (COLS - 1 - col);
    const x = padX + dir * (NODE_W + padX) + NODE_W / 2;
    const y = 40 + row * ROW_H;
    positions.push({x, y});
  }

  // draw connecting path on canvas
  const ctx2 = cvs.getContext('2d');
  ctx2.clearRect(0, 0, vw, totalH);
  ctx2.strokeStyle = '#5a2a00';
  ctx2.lineWidth = 8;
  ctx2.lineCap = 'round';
  ctx2.lineJoin = 'round';
  ctx2.setLineDash([14, 10]);
  ctx2.beginPath();
  positions.forEach((pt, i) => {
    if (i === 0) ctx2.moveTo(pt.x, pt.y + 30);
    else ctx2.lineTo(pt.x, pt.y + 30);
  });
  ctx2.stroke();
  // lighter line on top
  ctx2.strokeStyle = '#c8901a';
  ctx2.lineWidth = 4;
  ctx2.setLineDash([10, 14]);
  ctx2.stroke();
  ctx2.setLineDash([]);

  // create door nodes
  positions.forEach((pt, i) => {
    const unlocked = i <= maxUnlocked;
    const beaten = i < maxUnlocked;
    const locked = !unlocked;
    const node = document.createElement('div');
    node.className = 'ls-node' + (locked ? ' locked' : '') + (beaten ? ' beaten' : '');
    node.style.left = (pt.x - NODE_W/2) + 'px';
    node.style.top  = (pt.y - 10) + 'px';
    node.style.width = NODE_W + 'px';
    node.innerHTML = doorSVG(beaten, locked) +
      `<div class="ls-node-num">${beaten ? '✓ ' : ''}${i+1}</div>`;
    if (unlocked) {
      node.addEventListener('click', () => {
        hideLevelSelect();
        startFromLevel(i);
      });
    }
    path.appendChild(node);
  });

  // scroll to show current level
  const cur = Math.min(maxUnlocked, defs.length - 1);
  const curY = positions[cur].y;
  setTimeout(() => {
    document.getElementById('lsScroll').scrollTop = Math.max(0, curY - 200);
  }, 50);
}

function showLevelSelect() {
  document.getElementById('pauseBtn').style.display = 'none';
  document.getElementById('levelSelectOverlay').style.display = 'flex';
  buildLevelSelect();
}

function hideLevelSelect() {
  document.getElementById('levelSelectOverlay').style.display = 'none';
}

// ─── pause ────────────────────────────────────────────────────────────────────
let paused = false;

function setPaused(val) {
  paused = val;
  document.getElementById('pauseOverlay').style.display = val ? 'flex' : 'none';
}

document.addEventListener('keydown', e => {
  if (e.code === 'Escape' && gameActive) {
    setPaused(!paused);
  }
});
document.getElementById('pauseBtn').addEventListener('click', () => setPaused(true));
document.getElementById('pauseResumeBtn').addEventListener('click', () => setPaused(false));
document.getElementById('pauseLevelsBtn').addEventListener('click', () => {
  setPaused(false);
  gameActive = false;
  document.getElementById('pauseBtn').style.display = 'none';
  showLevelSelect();
});
document.getElementById('pauseRestartBtn').addEventListener('click', () => {
  setPaused(false);
  loadLevel(curLevel);
});

function startFromLevel(idx) {
  curLevel = idx; totalDeaths = 0;
  document.getElementById('deathNum').textContent = '0';
  document.getElementById('pauseBtn').style.display = 'flex';
  loadLevel(idx);
  gameActive = true;
  loop();
}

// patch showWin to save progress
const _origShowWin = showWin;
window.showWin = function() {
  markLevelBeaten(curLevel - 1);
  _origShowWin();
};

// ─── start ────────────────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('startOverlay').style.display = 'none';
  showLevelSelect();
});

document.getElementById('lsBackBtn').addEventListener('click', () => {
  hideLevelSelect();
  document.getElementById('startOverlay').style.display = 'flex';
});

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('winOverlay').style.display = 'none';
  showLevelSelect();
});
</script>
</body>

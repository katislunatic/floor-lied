<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Floor Lied</title>
<link rel="icon" type="image/png" href="floor_lied.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* { margin:0; padding:0; box-sizing:border-box; cursor:none !important; }
*:hover { cursor:none !important; }
body {
  background:#7a5010;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh;
  font-family:'Segoe UI',sans-serif;
  user-select:none;
  overflow:hidden;
}
/* fixed game canvas — centered, surrounded by warm bg */
#c {
  display:block;
  width:600px; height:360px;
  flex-shrink:0;
}
/* floating in-game HUD above canvas */
#hud {
  width:600px;
  display:flex; justify-content:space-between; align-items:center;
  padding:6px 4px;
  z-index:5;
  pointer-events:none;
}
#hud span { color:#fff; font-family:'Press Start 2P',monospace; font-size:8px; text-shadow:1px 1px 0 #000; }
#trollmsg {
  color:#ffcc00; font-size:8px; font-weight:700;
  font-family:'Press Start 2P',monospace;
  min-width:200px; text-align:center;
  text-shadow:0 0 8px #ff9900;
}
#controls { display:none; }

/* ── LEVEL TRANSITION ── */
#transition {
  position:fixed; inset:0;
  z-index:50;
  pointer-events:none;
  display:none;
  overflow:hidden;
  background:transparent;
}
#transCanvas {
  position:absolute; inset:0;
  width:100%; height:100%;
}
#transitionLabel {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-family:'Press Start 2P',monospace;
  font-size:14px;
  color:#f0c060;
  text-shadow:2px 2px 0 #3a0500;
  letter-spacing:3px;
  opacity:0;
  white-space:nowrap;
  z-index:2;
}

/* ── MOBILE TOUCH CONTROLS ── */
#mobileControls {
  display:none;
  position:fixed; bottom:0; left:0; right:0;
  height:140px; z-index:7;
  pointer-events:none;
}
#mobileControls.active { display:block; }
#btnLeft, #btnRight {
  position:absolute; bottom:20px;
  width:70px; height:70px; border-radius:50%;
  background:rgba(240,192,96,0.25);
  border:3px solid rgba(240,192,96,0.5);
  pointer-events:all;
  display:flex; align-items:center; justify-content:center;
  font-size:24px; color:rgba(240,192,96,0.8);
  user-select:none; -webkit-user-select:none;
  touch-action:none;
}
#btnLeft  { left:20px; }
#btnRight { left:110px; }
#btnJump {
  position:absolute; bottom:20px; right:20px;
  width:80px; height:80px; border-radius:50%;
  background:rgba(240,192,96,0.25);
  border:3px solid rgba(240,192,96,0.5);
  pointer-events:all;
  display:flex; align-items:center; justify-content:center;
  font-size:22px; color:rgba(240,192,96,0.8);
  user-select:none; -webkit-user-select:none;
  touch-action:none;
}
#btnLeft:active, #btnRight:active, #btnJump:active {
  background:rgba(240,192,96,0.5);
}
/* ESC / pause button — sits top-left of the canvas area */
#pauseBtn {
  position:fixed; top:10px; left:calc(50vw - 300px);
  width:38px; height:38px;
  background:rgba(80,20,0,0.9);
  border:2px solid #c8901a;
  border-radius:6px;
  cursor:pointer; z-index:6;
  display:none;
  align-items:center; justify-content:center;
  font-size:15px;
  transition:background .1s;
}
#pauseBtn:hover { background:rgba(160,50,0,0.95); }
/* pause overlay */
#pauseOverlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.75);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:20;
}
#pauseOverlay h2 {
  font-family:'Press Start 2P',monospace;
  font-size:28px; color:#f0c060;
  text-shadow:3px 3px 0 #5a0a00;
  margin-bottom:32px;
}
.pause-btn {
  font-family:'Press Start 2P',monospace;
  font-size:10px; padding:12px 28px;
  margin:6px;
  background:#f0c060; color:#3a0500;
  border:3px solid #5a0a00;
  box-shadow:3px 3px 0 #3a0500;
  cursor:pointer;
}
.pause-btn:hover { background:#fff8c0; }

/* overlays */
.overlay {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:10;
}
.overlay .sub { font-size:13px; color:#888; margin-bottom:4px; line-height:1.8; text-align:center; }
.overlay .warn { color:#ff4444; font-size:12px; margin-top:4px; }
.btn {
  margin-top:20px; padding:12px 32px;
  background:#fff; color:#000;
  border:none; font-size:13px; font-weight:700;
  cursor:pointer; letter-spacing:1px;
  transition:background .15s, color .15s;
  font-family:'Press Start 2P', monospace;
}
.btn:hover { background:#ffcc00; }
#winOverlay { display:none; }
#winOverlay h1 { color:#00ff99; }
#winDeaths { color:#aaa; font-size:13px; margin-top:8px; }

/* ── START SCREEN ── */
#startOverlay {
  background: linear-gradient(to bottom, #8b1a00 0%, #c45a00 50%, #e8900a 100%);
  overflow:hidden;
}
#startContent {
  position:relative; z-index:2;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  width:100%; height:100%;
  padding-bottom:80px;
}
#startTitle {
  font-family:'Press Start 2P', monospace;
  font-size:52px;
  color:#f0c060;
  text-shadow: 5px 5px 0 #5a0a00, 9px 9px 0 #3a0500;
  letter-spacing:4px;
  margin-bottom:12px;
  text-align:center;
  animation: titleBob 2s ease-in-out infinite;
}
@keyframes titleBob {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-8px); }
}
#startTagline {
  font-family:'Press Start 2P', monospace;
  font-size:9px;
  color:#c07830;
  letter-spacing:2px;
  margin-bottom:48px;
  text-align:center;
}
#startBtn {
  font-size:12px;
  padding:16px 48px;
  background:#f0c060;
  color:#3a0500;
  border:4px solid #5a0a00;
  box-shadow: 5px 5px 0 #3a0500;
  cursor:pointer;
  font-family:'Press Start 2P', monospace;
  transition:transform .08s, box-shadow .08s;
}
#startBtn:hover { transform:translate(-2px,-2px); box-shadow:7px 7px 0 #3a0500; background:#fff8c0; }
#startBtn:active { transform:translate(2px,2px); box-shadow:2px 2px 0 #3a0500; }
#startHint {
  font-family:'Press Start 2P', monospace;
  font-size:7px;
  color:#a06020;
  margin-top:18px;
}
/* spike row at bottom */
#startSpikes {
  position:absolute; bottom:0; left:0; right:0; height:70px;
  width:100%;
}

/* win screen */
#winOverlay { background:rgba(0,0,0,.92); }
#winOverlay h1 {
  font-family:'Press Start 2P', monospace;
  font-size:28px;
  color:#00ff99;
  text-shadow: 3px 3px 0 #005533;
  margin-bottom:12px;
}

/* ── LEVEL SELECT ── */
#levelSelectOverlay {
  background: linear-gradient(to bottom, #8b1a00 0%, #c45a00 50%, #e8900a 100%);
  overflow:hidden;
  align-items:flex-start;
  justify-content:flex-start;
}
#lsSpikes {
  position:absolute; bottom:0; left:0; right:0; height:70px; z-index:3;
  width:100%;
}
#lsHeader {
  position:relative; z-index:2;
  width:100%; padding:28px 0 16px;
  display:flex; align-items:center; justify-content:center; gap:24px;
}
#lsTitle {
  font-family:'Press Start 2P', monospace;
  font-size:20px;
  color:#f0c060;
  text-shadow: 3px 3px 0 #5a0a00;
  letter-spacing:3px;
}
#lsBackBtn {
  font-size:8px; padding:8px 16px;
  background:#f0c060; color:#3a0500;
  border:3px solid #5a0a00;
  box-shadow:3px 3px 0 #3a0500;
  font-family:'Press Start 2P', monospace;
  cursor:pointer;
}
#lsBackBtn:hover { background:#fff8c0; }
#lsResetBtn {
  font-size:7px; padding:8px 12px;
  background:rgba(180,30,30,0.85); color:#ffcccc;
  border:3px solid #8b0000;
  box-shadow:3px 3px 0 #5a0000;
  font-family:'Press Start 2P', monospace;
  cursor:pointer;
}
#lsResetBtn:hover { background:rgba(220,40,40,0.95); }
/* scrollable path area */
#lsScroll {
  position:relative; z-index:2;
  width:100%; flex:1;
  overflow-y:auto; overflow-x:hidden;
  padding-bottom:90px;
}
#lsScroll::-webkit-scrollbar { width:6px; }
#lsScroll::-webkit-scrollbar-track { background:rgba(0,0,0,0.2); }
#lsScroll::-webkit-scrollbar-thumb { background:#5a0a00; border-radius:3px; }
/* the SVG path canvas */
#lsPathCanvas {
  display:block;
  position:absolute; top:0; left:0;
  pointer-events:none;
}
#lsPath {
  position:relative;
  width:100%;
}
/* individual door nodes on the path */
.ls-node {
  position:absolute;
  display:flex; flex-direction:column;
  align-items:center;
  cursor:pointer;
  transition:transform .1s;
}
.ls-node:hover:not(.locked) { transform:translateY(-4px) scale(1.08); }
.ls-node.locked { cursor:default; opacity:0.45; }
.ls-door-svg { width:48px; height:62px; }
.ls-node-num {
  font-family:'Press Start 2P', monospace;
  font-size:7px;
  color:#f0c060;
  margin-top:3px;
  text-shadow:1px 1px 0 #3a0500;
}
.ls-node.beaten .ls-node-num { color:#88ff66; }
.ls-node.locked .ls-node-num { color:#8a6030; }
</style>
</head>
<body>

<div class="overlay" id="startOverlay">
  <!-- spike row at bottom -->
  <svg id="startSpikes" viewBox="0 0 1200 70" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="0,70 0,30 30,70 60,0 90,70 120,10 150,70 180,5 210,70 240,15 270,70 300,2 330,70 360,12 390,70 420,8 450,70 480,18 510,70 540,4 570,70 600,14 630,70 660,6 690,70 720,16 750,70 780,3 810,70 840,11 870,70 900,7 930,70 960,17 990,70 1020,5 1050,70 1080,13 1110,70 1140,9 1170,70 1200,4 1200,70" fill="#5a0a00"/>
  </svg>
  <div id="startContent">
    <div id="startTitle">FLOOR LIED</div>
    <div id="startTagline">a &ldquo;normal&rdquo; platformer</div>
    <button class="btn" id="startBtn">▶ PLAY</button>
    <div id="startHint">← → MOVE &nbsp;&nbsp; ↑ / SPACE JUMP</div>
  </div>
</div>

<div class="overlay" id="winOverlay" style="display:none;">
  <h1>YOU WIN!</h1>
  <div class="sub" style="color:#aaa;font-family:'Press Start 2P',monospace;font-size:9px;line-height:2;">You actually made it.<br>Honestly didn't expect that.</div>
  <div id="winDeaths" style="color:#888;font-size:11px;margin-top:10px;font-family:'Press Start 2P',monospace;"></div>
  <button class="btn" id="restartBtn" style="margin-top:24px;">LEVEL SELECT</button>
</div>

<div class="overlay" id="levelSelectOverlay" style="display:none;">
  <svg id="lsSpikes" viewBox="0 0 1200 70" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="0,70 0,30 30,70 60,0 90,70 120,10 150,70 180,5 210,70 240,15 270,70 300,2 330,70 360,12 390,70 420,8 450,70 480,18 510,70 540,4 570,70 600,14 630,70 660,6 690,70 720,16 750,70 780,3 810,70 840,11 870,70 900,7 930,70 960,17 990,70 1020,5 1050,70 1080,13 1110,70 1140,9 1170,70 1200,4 1200,70" fill="#5a0a00"/>
  </svg>
  <div id="lsHeader">
    <button id="lsBackBtn">← BACK</button>
    <div id="lsTitle">SELECT LEVEL</div>
    <button id="lsResetBtn">🗑 RESET</button>
  </div>

  <!-- confirm reset popup -->
  <div id="lsResetConfirm" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85);
    z-index:99; align-items:center; justify-content:center; flex-direction:column;">
    <div style="font-family:'Press Start 2P',monospace; font-size:11px; color:#f0c060;
      text-shadow:2px 2px 0 #3a0500; margin-bottom:24px; text-align:center; line-height:2;">
      WIPE ALL PROGRESS?<br><span style="font-size:8px;color:#c07830;">this cannot be undone</span>
    </div>
    <div style="display:flex; gap:16px;">
      <button class="pause-btn" id="lsResetConfirmYes">✓ YES</button>
      <button class="pause-btn" id="lsResetConfirmNo">✗ NO</button>
    </div>
  </div>
  <div id="lsScroll">
    <div id="lsPath">
      <canvas id="lsPathCanvas"></canvas>
    </div>
  </div>
</div>

<canvas id="c"></canvas>

<!-- floating HUD -->
<div id="hud">
  <span id="levelName">LEVEL 1</span>
  <span id="trollmsg"></span>
  <span>DEATHS: <span id="deathNum">0</span></span>
</div>

<!-- pause button (top-left, shown during gameplay) -->
<button id="pauseBtn" title="Pause (ESC)">⏸</button>

<!-- pause menu -->
<div id="pauseOverlay">
  <h2>PAUSED</h2>
  <button class="pause-btn" id="pauseResumeBtn">▶ RESUME</button>
  <button class="pause-btn" id="pauseLevelsBtn">SELECT LEVEL</button>
  <button class="pause-btn" id="pauseRestartBtn">↺ RESTART</button>
</div>

<div id="controls"></div>

<!-- level transition overlay -->
<div id="transition">
  <canvas id="transCanvas"></canvas>
  <div id="transitionLabel"></div>
</div>

<!-- mobile touch controls -->
<div id="mobileControls">
  <div id="btnLeft">◀</div>
  <div id="btnRight">▶</div>
  <div id="btnJump">▲</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 600; canvas.height = 360;
const W = 600, H = 360;

// ─── state ────────────────────────────────────────────────────────────────────
let totalDeaths = 0;
let curLevel = 0;
let gameActive = false;
let frame = 0;
let trollTimeout = null;

// ─── door entry animation ─────────────────────────────────────────────────────
let doorAnim = null;
let transitioning = false; // true while level transition is playing // null = no anim, else {x,y,phase,timer}
// phases: 'entering' (player walks into open door), 'closing' (door shuts), 'done'

// ─── input ────────────────────────────────────────────────────────────────────
const K = {};
document.addEventListener('keydown', e => { K[e.code] = true; });
document.addEventListener('keyup',   e => { K[e.code] = false; });
const left  = () => K['ArrowLeft']  || K['KeyA'];
const right = () => K['ArrowRight'] || K['KeyD'];
const jump  = () => K['ArrowUp']    || K['KeyW'] || K['Space'];

// ─── player ───────────────────────────────────────────────────────────────────
let p = {};
function spawnPlayer(x, y) {
  p = { x, y, w:18, h:24, vx:0, vy:0, grounded:false, dead:false, deadTimer:0 };
}

// ─── troll messages ───────────────────────────────────────────────────────────
const msgs = ["lol","nice try","skill issue","trust nobody","you good?","bro...",
  "the floor said no","didn't see that?","classic","almost!","close one",
  "it looked safe though","gravity is just a suggestion","read the room",
  "maybe slow down","you'll get it","eventually","🤡","the door moved lol",
  "what if i told you","that was on purpose","oops","heh","nah","frfr"];
function troll(msg) {
  clearTimeout(trollTimeout);
  const el = document.getElementById('trollmsg');
  el.textContent = msg || msgs[Math.floor(Math.random()*msgs.length)];
  trollTimeout = setTimeout(() => el.textContent = '', 2500);
}

// ─── level definitions ────────────────────────────────────────────────────────
function makeLevels() {
  return [

    // ── 1: Floor looks fine — one hole punches open mid-run ──────────────────
    {
      name:"1 - JUST WALK",
      bg:'#e8a84a',
      spawn:[30,296],
      door:[548,282],
      platforms:[
        {x:0,   y:320, w:600, h:40},
      ],
      traps:[
        { trigger:'playerX', val:240, fired:false,
          action:'removeFloorChunk', cx:280, cw:70, msg:"the floor said no" }
      ],
    },

    // ── 2: Ceiling drops ──────────────────────────────────────────────────────
    {
      name:"2 - LOW CEILING",
      bg:'#e8a84a',
      spawn:[30,296],
      door:[548,282],
      platforms:[
        {x:0, y:320, w:600, h:40},
      ],
      extraRects:[
        {x:0, y:0, w:600, h:20, color:'#3a3a5c'},
      ],
      traps:[
        { trigger:'playerX', val:180, fired:false,
          action:'ceilingDrop', targetY:272, msg:"don't jump" }
      ],
    },

    // ── 3: Collapse tile ──────────────────────────────────────────────────────
    {
      name:"3 - NORMAL FLOOR",
      bg:'#e8a84a',
      spawn:[30,296],
      door:[548,282],
      platforms:[
        {x:0,   y:320, w:230, h:40},
        {x:250, y:320, w:55,  h:40, special:'collapse', collapseTimer:-1},
        {x:325, y:320, w:275, h:40},
      ],
      traps:[],
    },

    // ── 4: Gap + wall spike ───────────────────────────────────────────────────
    {
      name:"4 - EASY GAP",
      bg:'#e8a84a',
      spawn:[30,296],
      door:[548,282],
      platforms:[
        {x:0,   y:320, w:210, h:40},
        {x:290, y:320, w:310, h:40},
      ],
      wallSpikes:[
        {x:-44, y:228, w:44, h:36, vx:2.2, active:false, done:false, color:'#7a5010'}
      ],
      traps:[
        { trigger:'playerX', val:175, fired:false,
          action:'activateWallSpike', idx:0, msg:"incoming" }
      ],
    },

    // ── 5: Invisible pit ─────────────────────────────────────────────────────
    {
      name:"5 - SOLID FLOOR",
      bg:'#e8a84a',
      spawn:[30,296],
      door:[548,282],
      platforms:[
        {x:0, y:320, w:600, h:40},
      ],
      invisPits:[
        {x:285, y:320, w:72, h:40}
      ],
      traps:[],
    },

    // ── 6: Teleport pad ───────────────────────────────────────────────────────
    {
      name:"6 - ALMOST THERE",
      bg:'#e8a84a',
      spawn:[30,296],
      door:[520,206],
      platforms:[
        {x:0,   y:320, w:600, h:40},
        {x:330, y:272, w:100, h:20},
        {x:470, y:244, w:110, h:20},
      ],
      teleportPads:[
        {x:470, y:244, w:110, h:20, destX:30, destY:290, msg:"nope"}
      ],
      traps:[],
    },

    // ── 7: Drop spikes ────────────────────────────────────────────────────────
    {
      name:"7 - OPEN ROOM",
      bg:'#e8a84a',
      spawn:[30,296],
      door:[548,282],
      platforms:[
        {x:0, y:320, w:600, h:40},
      ],
      dropSpikes:[
        {x:192, y:-24, w:22, h:22, vy:0, active:false, fallen:false, color:'#7a5010'},
        {x:328, y:-24, w:22, h:22, vy:0, active:false, fallen:false, color:'#7a5010'},
        {x:462, y:-24, w:22, h:22, vy:0, active:false, fallen:false, color:'#7a5010'},
      ],
      traps:[
        { trigger:'playerX', val:155, fired:false, action:'dropSpike', idx:0, msg:"heads up" },
        { trigger:'playerX', val:295, fired:false, action:'dropSpike', idx:1, msg:null },
        { trigger:'playerX', val:428, fired:false, action:'dropSpike', idx:2, msg:"still going?" },
      ],
    },

    // ── 8: Sliding platform ───────────────────────────────────────────────────
    {
      name:"8 - MOVING PLATFORM",
      bg:'#e8a84a',
      spawn:[30,296],
      door:[548,282],
      platforms:[
        {x:0,   y:320, w:120, h:40},
        {x:175, y:308, w:130, h:32, special:'slideRight', vx:0, maxX:440},
        {x:440, y:320, w:160, h:40},
      ],
      traps:[
        { trigger:'playerX', val:130, fired:false,
          action:'startSlide', idx:1, speed:1.6, msg:"hold on" }
      ],
    },

    // ── 9: Controls flip ──────────────────────────────────────────────────────
    {
      name:"9 - EASY ROOM",
      bg:'#e8a84a',
      spawn:[30,296],
      door:[548,282],
      platforms:[
        {x:0,   y:320, w:390, h:40},
        {x:450, y:320, w:150, h:40},
      ],
      traps:[
        { trigger:'playerX', val:300, fired:false,
          action:'flipControls', msg:"wait... left is right?" },
        // after controls flip, player instinctively presses right (which goes left)
        // a hole opens just behind them when they drift back past x=260
        { trigger:'playerXBelow_afterFlip', val:260, fired:false,
          action:'removeFloorChunk', cx:180, cw:80, msg:"nice instincts" },
      ],
    },

    // ── 10: Door runs away — hole opens only after door has moved, when you get close ─
    {
      name:"10 - FINISH LINE",
      bg:'#e8a84a',
      spawn:[30,296],
      door:[490,282],
      platforms:[
        {x:0, y:320, w:600, h:40},
      ],
      traps:[
        { trigger:'playerX', val:400, fired:false,
          action:'moveDoor', newX:30, newY:282, msg:"door said no" },
        { trigger:'playerXBelow_afterDoor', val:250, fired:false,
          action:'removeFloorChunk', cx:85, cw:120, msg:"nice try though" },
      ],
    },

    // ── 11: Platform spike from above ────────────────────────────────────────
    {
      name:"11 - CHOOSE WISELY",
      bg:'#e8a84a',
      spawn:[30,216],
      door:[548,202],
      platforms:[
        {x:0,   y:240, w:120, h:20},
        {x:160, y:240, w:120, h:20},
        {x:320, y:240, w:120, h:20},
        {x:480, y:240, w:120, h:20},
      ],

// ─── level runtime state ──────────────────────────────────────────────────────
let lvl = null;
let levelData = null;
let flipControls = false;
let gravFlipped = false;
let gravFlipUsed = false;
let flashRevealTimer = 0;

function loadLevel(idx) {
  const defs = makeLevels();
  if (idx >= defs.length) { showWin(); return; }
  levelData = defs[idx];
  lvl = JSON.parse(JSON.stringify(levelData));
  flipControls = false;
  gravFlipped = false;
  gravFlipUsed = false;
  flashRevealTimer = 0;
  doorAnim = null;
  frame = 0;
  spawnPlayer(lvl.spawn[0], lvl.spawn[1]);
  document.getElementById('levelName').textContent = `LEVEL ${lvl.name}`;
}

function showWin() {
  gameActive = false;
  document.getElementById('winOverlay').style.display = 'flex';
  document.getElementById('winDeaths').textContent = `Total deaths: ${totalDeaths}`;
}

// ─── collision helpers ────────────────────────────────────────────────────────
function overlaps(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}
function rectRect(a,b) {
  return overlaps(a.x,a.y,a.w,a.h, b.x,b.y,b.w,b.h);
}
function playerRect() { return {x:p.x,y:p.y,w:p.w,h:p.h}; }

// ─── death ────────────────────────────────────────────────────────────────────
function die(msg) {
  if (p.dead) return;
  p.dead = true; p.deadTimer = 45;
  totalDeaths++;
  document.getElementById('deathNum').textContent = totalDeaths;
  troll(msg);
  setTimeout(() => loadLevel(curLevel), 600);
}

// ─── trap execution ───────────────────────────────────────────────────────────
function fireTrap(trap) {
  trap.fired = true;
  const action = trap.action;

  if (action === 'removeFloorChunk') {
    const cx = trap.cx, cw = trap.cw;
    const toAdd = [];
    lvl.platforms = lvl.platforms.filter(pl => {
      if (pl.y < 310 || pl._gone) return true;
      // check if this platform overlaps the hole zone
      if (pl.x + pl.w <= cx || pl.x >= cx + cw) return true; // no overlap, keep
      // split it
      if (pl.x < cx) toAdd.push({x:pl.x, y:pl.y, w:cx - pl.x, h:pl.h});
      if (pl.x + pl.w > cx + cw) toAdd.push({x:cx+cw, y:pl.y, w:(pl.x+pl.w)-(cx+cw), h:pl.h});
      return false; // remove original
    });
    lvl.platforms.push(...toAdd);
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'ceilingDrop') {
    lvl._ceilingY = 0;
    lvl._ceilingTargetY = trap.targetY;
    lvl._ceilingDropping = true;
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'activateWallSpike') {
    lvl.wallSpikes[trap.idx].active = true;
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'dropSpike') {
    if (lvl.dropSpikes && lvl.dropSpikes[trap.idx]) {
      lvl.dropSpikes[trap.idx].active = true;
      if (trap.msg) troll(trap.msg);
    }
  }

  if (action === 'startSlide') {
    const pl = lvl.platforms[trap.idx];
    if (pl) { pl._sliding = true; pl._slideSpeed = trap.speed; }
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'reverseFloor') {
    flipControls = !flipControls;
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'flipControls') {
    flipControls = !flipControls;
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'moveDoor') {
    lvl.door[0] = trap.newX; lvl.door[1] = trap.newY;
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'collapseFloor') {
    const pl = lvl.platforms[trap.platIdx];
    if (pl) { pl.special = 'collapse'; pl.collapseTimer = 30; }
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'spikeFromAbove') {
    lvl._fallingSpike = {x:trap.tx, y:trap.ty, w:trap.tw, h:trap.th, vy:trap.speed, color:'#cc3344'};
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'floorSlide') {
    lvl.platforms.forEach(pl => { if(pl.y===320) { pl._slideRight = true; pl._slideSpeed = trap.speed; } });
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'revealSpikes') {
    if (lvl.hiddenSpikes) lvl.hiddenSpikes.forEach(s => s.revealed = true);
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'activateWall') {
    lvl.movingWalls[trap.idx].active = true;
    lvl.movingWalls[trap.idx].vx = trap.speed;
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'flashReveal') {
    flashRevealTimer = trap.duration;
    if (trap.msg) troll(trap.msg);
  }

  if (action === 'gravityFlip') {
    gravFlipped = !gravFlipped;
    if (trap.msg) troll(trap.msg);
  }
}

// ─── update ───────────────────────────────────────────────────────────────────
function update() {
  if (!gameActive || !p || p.dead) return;
  if (transitioning) return; // block all input/movement during transition
  // if door animation is running, only advance it (no movement/death)
  if (doorAnim) {
    doorAnim.timer++;
    if (doorAnim.phase === 'opening') {
      // door swings open over 18 frames, player stays put
      p.vx = 0; p.vy = 0;
      if (doorAnim.timer >= 18) {
        // snap player into door centre, start entering
        p.x = doorAnim.x + (26 - p.w) / 2;
        p.y = doorAnim.y + (38 - p.h) / 2;
        doorAnim.phase = 'entering'; doorAnim.timer = 0;
      }
    } else if (doorAnim.phase === 'entering') {
      // player is inside door for 18 frames
      if (doorAnim.timer >= 18) {
        doorAnim.phase = 'closing'; doorAnim.timer = 0;
      }
    } else if (doorAnim.phase === 'closing') {
      if (doorAnim.timer >= 22) {
        doorAnim = null;
        markLevelBeaten(curLevel);
        curLevel++;
        const nextDef = makeLevels()[curLevel];
        const label = nextDef ? 'LEVEL ' + (curLevel+1) : 'YOU WIN!';
        gameActive = false;
        doTransition(label, () => {
          loadLevel(curLevel);
          gameActive = true;
          loop();
        });
      }
    }
    return;
  }
  frame++;

  const GRAV  = gravFlipped ? -0.5 : 0.5;
  const JSPD  = gravFlipped ?  10  : -10;
  const SPEED = 3.4;

  // movement
  const goLeft  = flipControls ? right() : left();
  const goRight = flipControls ? left()  : right();

  if (goLeft)  p.vx = -SPEED;
  else if (goRight) p.vx = SPEED;
  else p.vx *= 0.78;

  if (jump() && p.grounded) { p.vy = JSPD; p.grounded = false; }

  p.vy += GRAV;
  if (Math.abs(p.vy) > 16) p.vy = Math.sign(p.vy)*16;

  p.x += p.vx;
  p.y += p.vy;
  p.grounded = false;

  // ── platform collisions ──────────────────────────────────────────────────
  for (let i = 0; i < lvl.platforms.length; i++) {
    const pl = lvl.platforms[i];
    if (pl._gone) continue;
    if (pl.invisible && flashRevealTimer <= 0) continue;

    // slide platform
    if (pl._sliding) {
      pl.x += pl._slideSpeed;
      if (pl.x > lvl._slideMaxX || pl.x > 700) pl._slideSpeed = 0;
    }
    if (pl._slideRight) {
      pl.x += pl._slideSpeed;
      if (pl.x > 700) pl._gone = true;
    }

    // deadly floor
    if (pl.deadly) {
      if (overlaps(p.x,p.y,p.w,p.h, pl.x,pl.y,pl.w,pl.h)) { die(); return; }
      continue;
    }

    if (!overlaps(p.x,p.y,p.w,p.h, pl.x,pl.y,pl.w,pl.h)) continue;

    const overX = Math.min(p.x+p.w,pl.x+pl.w) - Math.max(p.x,pl.x);
    const overY = Math.min(p.y+p.h,pl.y+pl.h) - Math.max(p.y,pl.y);

    if (overX < overY) {
      p.x += p.x < pl.x ? -overX : overX; p.vx = 0;
    } else {
      if (!gravFlipped) {
        if (p.vy >= 0 && p.y+p.h <= pl.y+pl.h+4) {
          p.y = pl.y - p.h; p.vy = 0; p.grounded = true;
          if (pl.special === 'collapse') {
            if (pl.collapseTimer < 0) pl.collapseTimer = 38;
          }
          lvl.traps && lvl.traps.forEach(t => {
            if (!t.fired && t.trigger === 'playerStandOn' && t.platIdx === i) fireTrap(t);
          });
        } else if (p.vy < 0) { p.y = pl.y+pl.h; p.vy = 0; }
      } else {
        if (p.vy <= 0 && p.y >= pl.y-4) {
          p.y = pl.y+pl.h; p.vy = 0; p.grounded = true;
          if (pl.special === 'collapse' && pl.collapseTimer < 0) pl.collapseTimer = 38;
        } else if (p.vy > 0) { p.y = pl.y-p.h; p.vy = 0; }
      }
    }
  }

  // collapse timers
  lvl.platforms.forEach(pl => {
    if (pl.special === 'collapse' && pl.collapseTimer > 0) {
      pl.collapseTimer--;
      if (pl.collapseTimer === 0) pl._gone = true;
    }
  });

  // ── invisible pit death ──────────────────────────────────────────────────
  if (lvl.invisPits) {
    for (const pit of lvl.invisPits) {
      if (overlaps(p.x,p.y,p.w,p.h, pit.x,pit.y,pit.w,pit.h)) { die("surprise hole"); return; }
    }
  }

  // ── teleport pads ────────────────────────────────────────────────────────
  if (lvl.teleportPads) {
    for (const tp of lvl.teleportPads) {
      if (overlaps(p.x,p.y,p.w,p.h, tp.x,tp.y,tp.w,tp.h)) {
        p.x = tp.destX; p.y = tp.destY; p.vx = 0; p.vy = 0;
        troll(tp.msg || "teleported lol");
      }
    }
  }

  // ── ceiling drop ─────────────────────────────────────────────────────────
  if (lvl._ceilingDropping) {
    lvl._ceilingY = (lvl._ceilingY || 0) + 5;
    if (lvl._ceilingY >= lvl._ceilingTargetY) { lvl._ceilingY = lvl._ceilingTargetY; lvl._ceilingDropping = false; }
    const cy = lvl._ceilingY;
    if (overlaps(p.x,p.y,p.w,p.h, 0,cy,W,20)) { die("ceiling says hi"); return; }
  }

  // ── drop spikes ──────────────────────────────────────────────────────────
  if (lvl.dropSpikes) {
    for (const ds of lvl.dropSpikes) {
      if (!ds.active || ds.fallen) continue;
      ds.vy += 0.85; ds.y += ds.vy;
      if (ds.y > 360) { ds.fallen = true; continue; }
      if (overlaps(p.x+2,p.y+2,p.w-4,p.h-4, ds.x,ds.y,ds.w,ds.h)) { die(); return; }
      if (ds.y + ds.h >= 320) { ds.y = 300; ds.vy = 0; ds.fallen = true; }
    }
  }

  // ── wall spikes ──────────────────────────────────────────────────────────
  if (lvl.wallSpikes) {
    for (const ws of lvl.wallSpikes) {
      if (!ws.active || ws.done) continue;
      ws.x += ws.vx;
      if (ws.x > W+10 || ws.x+ws.w < -10) { ws.done = true; continue; }
      if (overlaps(p.x+1,p.y+1,p.w-2,p.h-2, ws.x,ws.y,ws.w,ws.h)) { die(); return; }
    }
  }

  // ── moving walls ─────────────────────────────────────────────────────────
  if (lvl.movingWalls) {
    for (const mw of lvl.movingWalls) {
      if (!mw.active) continue;
      mw.x += mw.vx;
      if (overlaps(p.x,p.y,p.w,p.h, mw.x,mw.y,mw.w,mw.h)) { die("squished"); return; }
    }
  }

  // ── falling spike from above ─────────────────────────────────────────────
  if (lvl._fallingSpike) {
    const fs = lvl._fallingSpike;
    fs.y += fs.vy;
    if (overlaps(p.x+2,p.y+2,p.w-4,p.h-4, fs.x,fs.y,fs.w,fs.h)) { die(); return; }
    if (fs.y > 400) lvl._fallingSpike = null;
  }

  // ── floor spikes (static) ────────────────────────────────────────────────
  if (lvl.floorSpikes) {
    for (const fs of lvl.floorSpikes) {
      if (fs.deadly && overlaps(p.x,p.y+p.h-2,p.w,4, fs.x,fs.y,fs.w,fs.h)) { die(); return; }
    }
  }

  // ── hidden spikes revealed ────────────────────────────────────────────────
  if (lvl.hiddenSpikes) {
    for (const hs of lvl.hiddenSpikes) {
      if (hs.revealed && overlaps(p.x+2,p.y+2,p.w-4,p.h-4, hs.x,hs.y,hs.w,hs.h)) { die(); return; }
    }
  }

  // ── jump pads ────────────────────────────────────────────────────────────
  if (lvl.jumpPads) {
    for (const jp of lvl.jumpPads) {

      // launch player when they step on pad
      if (overlaps(p.x,p.y+p.h-2,p.w,4, jp.x,jp.y,jp.w,jp.h) && p.vy >= 0) {
        p.vy = jp.boost;

        // GREEN: no spike visible yet. Once player is launched and gets near ceiling,
        // spike slides down from ceiling, kills them, then disappears.
        if (jp.triggersSpike && !jp.ceilSpike._triggered) {
          jp.ceilSpike._triggered = true;
          jp.ceilSpike._state = 'waiting'; // waiting for player to reach top
        }

        // RED: spike is always at ceiling. When player touches pad and launches up,
        // spike slides UP out of the way, then comes back down after a pause.
        if (jp.redPad && jp.ceilSpike._state !== 'retracting' && jp.ceilSpike._state !== 'gone' && jp.ceilSpike._state !== 'returning') {
          jp.ceilSpike._state = 'retracting';
          troll("wait...");
        }
      }

      // GREEN spike state machine
      if (jp.triggersSpike && jp.ceilSpike._triggered) {
        if (jp.ceilSpike._state === 'waiting' && p.y < 80) {
          // player near ceiling — spike appears and slides down
          jp.ceilSpike.y = 20;
          jp.ceilSpike._state = 'sliding_down';
          jp.ceilSpike.active = true;
        }
        if (jp.ceilSpike._state === 'sliding_down') {
          jp.ceilSpike.y += 2.0;
          if (jp.ceilSpike.y >= 280) {
            jp.ceilSpike.y = 280;
            jp.ceilSpike._state = 'done';
            // disappear after a moment
            setTimeout(() => {
              jp.ceilSpike.active = false;
              jp.ceilSpike.y = -200;
              jp.ceilSpike._triggered = false;
              jp.ceilSpike._state = 'idle';
            }, 1200);
          }
        }
      }

      // RED spike state machine — spike always visible at ceiling when idle
      if (jp.redPad) {
        if (!jp.ceilSpike._state) jp.ceilSpike._state = 'idle';

        if (jp.ceilSpike._state === 'retracting') {
          jp.ceilSpike.y -= 3;
          if (jp.ceilSpike.y + jp.ceilSpike.h < 0) {
            jp.ceilSpike.y = -jp.ceilSpike.h;
            jp.ceilSpike._state = 'gone';
            jp.ceilSpike._timer = 90;
            troll("huh?");
          }
        }
        if (jp.ceilSpike._state === 'gone') {
          jp.ceilSpike._timer--;
          if (jp.ceilSpike._timer <= 0) {
            jp.ceilSpike._state = 'returning';
            troll("it's back");
          }
        }
        if (jp.ceilSpike._state === 'returning') {
          jp.ceilSpike.y += 2;
          if (jp.ceilSpike.y >= 20) {
            jp.ceilSpike.y = 20;
            jp.ceilSpike._state = 'idle';
          }
        }
      }

      // collision — only when spike is on screen and active
      if (jp.ceilSpike && jp.ceilSpike.active && jp.ceilSpike.y >= 0) {
        if (overlaps(p.x+2,p.y+2,p.w-4,p.h-4, jp.ceilSpike.x,jp.ceilSpike.y,jp.ceilSpike.w,jp.ceilSpike.h)) {
          die("ow"); return;
        }
      }
    }
  }


  // ── coins ─────────────────────────────────────────────────────────────────
  if (lvl.coins) {
    lvl.coins.forEach((c, i) => {
      if (!c.alive) return;
      if (overlaps(p.x,p.y,p.w,p.h, c.x-c.r,c.y-c.r,c.r*2,c.r*2)) {
        c.alive = false;
        lvl.traps && lvl.traps.forEach(t => {
          if (!t.fired && t.trigger === 'coinCollect' && t.coinIdx === i) fireTrap(t);
        });
      }
    });
  }

  // ── bounds death ─────────────────────────────────────────────────────────
  if (p.y > H + 50)  { die("into the void"); return; }
  if (p.y < -80)     { die("too high!"); return; }
  if (p.x < -40 || p.x > W+40) { die(); return; }

  // ── trigger traps by playerX (right direction) ───────────────────────────
  if (lvl.traps) {
    for (const t of lvl.traps) {
      if (t.fired) continue;
      if (t.trigger === 'playerX' && p.x+p.w/2 >= t.val) fireTrap(t);
      // fires when player walks left close to the moved door — only after door has moved
      if (t.trigger === 'playerXBelow_afterDoor' && lvl.door[0] < 100 && p.x+p.w/2 <= t.val) fireTrap(t);
      // fires when player drifts back left after controls have flipped
      if (t.trigger === 'playerXBelow_afterFlip' && flipControls && p.x+p.w/2 <= t.val) fireTrap(t);
    }
  }

  // ── flash reveal timer ───────────────────────────────────────────────────
  if (flashRevealTimer > 0) flashRevealTimer--;

  // ── door check ───────────────────────────────────────────────────────────
  const [dx, dy] = lvl.door;
  if (!doorAnim && overlaps(p.x,p.y,p.w,p.h, dx,dy,26,38)) {
    p.vx = 0; p.vy = 0;
    // start with door opening phase — player stands in front
    doorAnim = { x:dx, y:dy, phase:'opening', timer:0, px:p.x, py:p.y };
  }

}

// ─── draw ─────────────────────────────────────────────────────────────────────
const PLAT_COLORS = {
  default: '#7a5010',
  collapse: '#7a5010',
  slideRight: '#4080a0',
  deadly: '#cc3344',
  slippery: '#80b0d0',
};

function drawPlatform(pl) {
  if (pl._gone) return;
  let col = PLAT_COLORS.default;
  if (pl.color) col = pl.color;

  if (pl.special === 'collapse') {
    col = PLAT_COLORS.collapse;
    if (pl.collapseTimer > 0) {
      ctx.save();
      ctx.translate((Math.random()-.5)*3, 0);
    }
  }
  if (pl.slippery) col = PLAT_COLORS.slippery;
  if (pl.deadly && !pl.color) col = '#cc3344';
  if (pl.invisible) {
    if (flashRevealTimer > 0) {
      ctx.globalAlpha = 0.4 + 0.6*(flashRevealTimer/60);
      col = '#8080ff';
    } else {
      ctx.globalAlpha = 0;
    }
  }
  ctx.fillStyle = col;
  ctx.fillRect(Math.round(pl.x), Math.round(pl.y), pl.w, pl.h);
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(Math.round(pl.x), Math.round(pl.y), pl.w, 3);
  ctx.globalAlpha = 1;
  if (pl.special === 'collapse' && pl.collapseTimer > 0) ctx.restore();
}

function drawSpikeTri(x, y, w, h, color, pointUp) {
  ctx.fillStyle = color;
  const count = Math.max(1, Math.floor(w/12));
  const tw = w / count;
  for (let i = 0; i < count; i++) {
    ctx.beginPath();
    if (pointUp) {
      ctx.moveTo(x+i*tw,   y+h);
      ctx.lineTo(x+i*tw+tw/2, y);
      ctx.lineTo(x+i*tw+tw, y+h);
    } else {
      ctx.moveTo(x+i*tw,   y);
      ctx.lineTo(x+i*tw+tw/2, y+h);
      ctx.lineTo(x+i*tw+tw, y);
    }
    ctx.closePath();
    ctx.fill();
  }
}

function drawDoor(x, y) {
  const DW = 26, DH = 38;
  const isAnimating = doorAnim && doorAnim.x === x && doorAnim.y === y;

  // How open is the door? 0=fully closed, 1=fully open
  let openAmt = 1.0; // default: open
  if (isAnimating) {
    if (doorAnim.phase === 'opening') {
      openAmt = doorAnim.timer / 18; // swings open
    } else if (doorAnim.phase === 'closing') {
      openAmt = 1.0 - (doorAnim.timer / 22); // swings shut
    }
    // 'entering' phase: stays fully open
  }

  // ── draw frame/surround ──
  ctx.fillStyle = '#cc9944';
  ctx.fillRect(x, y, DW, DH);
  ctx.fillStyle = '#ffcc66';
  ctx.fillRect(x, y, DW, 4); // top trim

  // ── dark interior behind door ──
  ctx.fillStyle = '#221100';
  ctx.fillRect(x+3, y+4, DW-6, DH-4);

  // ── door panel (perspective swing: hinge on RIGHT, opens to the LEFT) ──
  // When open, panel is very thin on the right. When closed, fills full interior.
  // We simulate perspective by drawing a trapezoid-like shape using canvas transforms.
  const innerW = DW - 6;
  const panelW = Math.round(innerW * (1 - openAmt)); // 0 when open, full when closed

  if (panelW > 0) {
    // Back face of door (slightly darker, visible when swinging)
    ctx.fillStyle = '#3a1a00';
    ctx.fillRect(x+3, y+4, panelW, DH-4);
    // Front face highlight strip on leading edge
    ctx.fillStyle = '#885522';
    ctx.fillRect(x+3, y+4, Math.min(3, panelW), DH-4);
    // Wood grain lines
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    for (let gi = 1; gi < 3 && gi*4 < panelW; gi++) {
      ctx.fillRect(x+3+gi*4, y+6, 1, DH-8);
    }
  }

  // knob on the LEFT edge of panel (moves as door swings)
  if (panelW > 4) {
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.arc(x+3+Math.min(panelW-4, innerW-4), y+22, 3, 0, Math.PI*2);
    ctx.fill();
  } else if (openAmt > 0.85) {
    // knob visible on right side of frame when door is open
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.arc(x+DW-6, y+22, 3, 0, Math.PI*2);
    ctx.fill();
  }

  // ── player silhouette inside door during 'entering' phase ──
  if (isAnimating && doorAnim.phase === 'entering') {
    const alpha = Math.min(0.85, doorAnim.timer / 8);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#110800';
    // body
    ctx.fillRect(x+7, y+12, 10, 18);
    // head
    ctx.beginPath();
    ctx.arc(x+12, y+10, 5, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawPlayer() {
  if (p.dead) {
    ctx.globalAlpha = Math.max(0, p.deadTimer/45);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(Math.round(p.x-3), Math.round(p.y-3), p.w+6, p.h+6);
    ctx.globalAlpha = 1;
    p.deadTimer--;
    return;
  }
  const px = Math.round(p.x), py = Math.round(p.y);
  ctx.fillStyle = '#e8d5b0';
  ctx.fillRect(px, py, p.w, p.h);
  ctx.fillStyle = '#222';
  ctx.fillRect(px+(p.vx>=0?10:4), py+6, 3, 3);
  ctx.fillStyle = '#a06030';
  ctx.fillRect(px+(p.vx>=0?8:3), py+14, 6, 2);
  const lp = Math.abs(p.vx)>.5 ? Math.sin(frame*.3)*3 : 0;
  ctx.fillStyle = '#4466aa';
  ctx.fillRect(px+2,   py+p.h, 6, 4+lp);
  ctx.fillRect(px+p.w-8, py+p.h, 6, 4-lp);
}

function render() {
  if (!lvl) return;
  ctx.fillStyle = lvl.bg || '#e8a84a';
  ctx.fillRect(0,0,W,H);

  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  if (lvl.extraRects) {
    for (const r of lvl.extraRects) {
      ctx.fillStyle = r.color || '#333';
      ctx.fillRect(r.x, r.y, r.w, r.h);
    }
  }

  if (lvl._ceilingY !== undefined && lvl._ceilingY >= 0) {
    ctx.fillStyle = '#cc3344';
    ctx.fillRect(0, lvl._ceilingY, W, 20);
  }

  lvl.platforms.forEach(drawPlatform);

  if (lvl.invisPits) {
    for (const pit of lvl.invisPits) {
      ctx.fillStyle = '#4060a0';
      ctx.fillRect(pit.x, pit.y, pit.w, pit.h);
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      ctx.fillRect(pit.x, pit.y, pit.w, 3);
    }
  }

  if (lvl.hiddenSpikes) {
    for (const hs of lvl.hiddenSpikes) {
      if (!hs.revealed) continue;
      drawSpikeTri(hs.x, hs.y, hs.w, hs.h, hs.color, true);
    }
  }

  if (lvl.floorSpikes) {
    for (const fs of lvl.floorSpikes) {
      if (!fs.deadly) continue;
      ctx.fillStyle = fs.color || '#cc3344';
      ctx.fillRect(fs.x, fs.y, fs.w, fs.h);
    }
  }

  if (lvl.jumpPads) {
    for (const jp of lvl.jumpPads) {
      ctx.fillStyle = jp.color;
      ctx.fillRect(jp.x, jp.y, jp.w, jp.h);
      // draw ceiling spike
      if (jp.ceilSpike) {
        // red pad: always draw spike as long as it's on screen (even while retracting/returning)
        // green pad: only draw once triggered
        // red: draw whenever on screen; green: only draw once triggered (spike moved to ceiling)
        const shouldDraw = jp.redPad
          ? (jp.ceilSpike.y > -jp.ceilSpike.h - 5)
          : (jp.ceilSpike.active && jp.ceilSpike.y >= 0);
        if (shouldDraw) {
          drawSpikeTri(jp.ceilSpike.x, jp.ceilSpike.y, jp.ceilSpike.w, jp.ceilSpike.h, jp.ceilSpike.color, false);
        }
      }
    }
  }

  if (lvl.dropSpikes) {
    for (const ds of lvl.dropSpikes) {
      if (!ds.active) continue;
      drawSpikeTri(ds.x, ds.y, ds.w, ds.h, ds.color, true);
    }
  }

  if (lvl.wallSpikes) {
    for (const ws of lvl.wallSpikes) {
      if (!ws.active || ws.done) continue;
      ctx.fillStyle = ws.color;
      ctx.fillRect(Math.round(ws.x), ws.y, ws.w, ws.h);
    }
  }

  if (lvl.movingWalls) {
    for (const mw of lvl.movingWalls) {
      ctx.fillStyle = mw.color || '#cc3344';
      ctx.fillRect(Math.round(mw.x), mw.y, mw.w, mw.h);
    }
  }

  if (lvl._fallingSpike) {
    const fs = lvl._fallingSpike;
    ctx.fillStyle = fs.color;
    ctx.fillRect(fs.x, Math.round(fs.y), fs.w, fs.h);
  }

  if (lvl.teleportPads) {
    for (const tp of lvl.teleportPads) {
      ctx.fillStyle = '#cc3344';
      ctx.fillRect(tp.x, tp.y, tp.w, tp.h);
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(tp.x, tp.y, tp.w, 3);
    }
  }

  if (lvl.coins) {
    ctx.fillStyle = '#ffcc00';
    for (const c of lvl.coins) {
      if (!c.alive) continue;
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#fff8cc';
      ctx.beginPath();
      ctx.arc(c.x-2, c.y-2, c.r*.4, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#ffcc00';
    }
  }

  const [dx,dy] = lvl.door;
  drawDoor(dx, dy);

  if (gravFlipped) {
    ctx.fillStyle = 'rgba(0,200,255,0.06)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#00aaff';
    ctx.font = '10px monospace';
    ctx.fillText('▲ gravity flipped ▲', 10, H-10);
  }

  if (flipControls && frame < 200) {
    ctx.fillStyle = 'rgba(255,100,0,0.5)';
    ctx.font = '9px monospace';
    ctx.fillText('controls: normal', 10, H-10);
  }

  drawPlayer();
}

// ─── loop ─────────────────────────────────────────────────────────────────────
function loop() {
  if (!paused) {
    update();
    render();
  }
  if (gameActive) requestAnimationFrame(loop);
}

// ─── level transition — jaws snap shut then open ─────────────────────────────
function doTransition(labelText, callback) {
  const el  = document.getElementById('transition');
  const cvs = document.getElementById('transCanvas');
  const lbl = document.getElementById('transitionLabel');
  const tc  = cvs.getContext('2d');

  transitioning = true;
  el.style.display = 'block';
  lbl.style.opacity = 0;
  lbl.textContent = labelText || '';

  cvs.width  = window.innerWidth;
  cvs.height = window.innerHeight;
  const W = cvs.width, H = cvs.height;

  const TOOTH_W  = 90;   // width of each tooth at base
  const TOOTH_H  = 110;  // height of tooth point
  const N = Math.ceil(W / TOOTH_W) + 2;
  const BG = '#6a0a00';
  const TOOTH_FILL = '#8b1500';
  const TOOTH_HL   = '#b02000';

  function drawJaw(jawY, pointDown) {
    tc.fillStyle = BG;
    if (pointDown) {
      tc.fillRect(0, 0, W, jawY);
    } else {
      tc.fillRect(0, jawY, W, H - jawY);
    }

    // offset bottom jaw by half a tooth so teeth interlock perfectly
    const offset = pointDown ? 0 : TOOTH_W / 2;

    for (let i = -1; i < N + 1; i++) {
      const tx = i * TOOTH_W + offset;
      const tipX = tx + TOOTH_W / 2;
      const baseY = jawY;
      const tipY  = pointDown ? jawY + TOOTH_H : jawY - TOOTH_H;

      tc.beginPath();
      tc.moveTo(tx, baseY);
      tc.lineTo(tx + TOOTH_W, baseY);
      tc.lineTo(tipX, tipY);
      tc.closePath();
      tc.fillStyle = TOOTH_FILL;
      tc.fill();

      // highlight
      tc.beginPath();
      tc.moveTo(tx, baseY);
      tc.lineTo(tipX, tipY);
      tc.lineTo(tx + TOOTH_W * 0.35, baseY);
      tc.closePath();
      tc.fillStyle = TOOTH_HL;
      tc.globalAlpha = 0.3;
      tc.fill();
      tc.globalAlpha = 1;
    }
  }

  let t = 0;
  const CLOSE_F = 28;
  const HOLD_F  = 55;
  const OPEN_F  = 30;

  function easeOut(p) { return 1 - Math.pow(1 - p, 3); }
  function easeIn(p)  { return p * p; }

  function tick() {
    tc.clearRect(0, 0, W, H);
    t++;

    let topJawY, botJawY;

    if (t <= CLOSE_F) {
      const p = easeOut(t / CLOSE_F);
      topJawY = -TOOTH_H + p * (H / 2 + TOOTH_H);
      botJawY =  H + TOOTH_H - p * (H / 2 + TOOTH_H);
      if (t === CLOSE_F) { lbl.style.opacity = 1; callback(); }
    } else if (t <= CLOSE_F + HOLD_F) {
      topJawY = H / 2;
      botJawY = H / 2;
    } else {
      const p = easeIn((t - CLOSE_F - HOLD_F) / OPEN_F);
      topJawY = H / 2 - p * (H / 2 + TOOTH_H);
      botJawY = H / 2 + p * (H / 2 + TOOTH_H);
      lbl.style.opacity = Math.max(0, 1 - p * 2.5);
      if (t >= CLOSE_F + HOLD_F + OPEN_F) {
        el.style.display = 'none';
        transitioning = false;
        return;
      }
    }

    const gap = botJawY - topJawY;
    const fadeStart = TOOTH_H * 1.4;
    const fadeEnd   = TOOTH_H * 0.2;
    // alpha for teeth: 1 when far apart, fades to 0 as jaws close
    const toothAlpha = Math.max(0, Math.min(1, (gap - fadeEnd) / (fadeStart - fadeEnd)));

    // always draw solid jaw fills
    tc.fillStyle = BG;
    tc.fillRect(0, 0, W, topJawY);
    tc.fillRect(0, botJawY, W, H - botJawY);
    if (gap <= 0) tc.fillRect(0, 0, W, H);

    // draw teeth on top with fading alpha
    if (toothAlpha > 0) {
      tc.globalAlpha = toothAlpha;
      drawJaw(botJawY, false);
      drawJaw(topJawY, true);
      tc.globalAlpha = 1;
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ─── save / progress ─────────────────────────────────────────────────────────
const SAVE_KEY = 'normalPlatformerProgress';
let maxUnlocked = 0; // highest level index unlocked (0 = level 1 available)

function saveProgress() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify({maxUnlocked})); } catch(e){}
}
function loadProgress() {
  try {
    const d = JSON.parse(localStorage.getItem(SAVE_KEY)||'{}');
    maxUnlocked = d.maxUnlocked || 0;
  } catch(e){ maxUnlocked = 0; }
}
function markLevelBeaten(idx) {
  if (idx >= maxUnlocked) { maxUnlocked = idx + 1; saveProgress(); }
}
loadProgress();

// ─── level select — winding path style ───────────────────────────────────────
function doorSVG(beaten, locked) {
  const frameCol = locked ? '#4a3020' : beaten ? '#60aa20' : '#c8901a';
  const innerCol = locked ? '#1a0e04' : beaten ? '#1a3a08' : '#3a1a08';
  const knobCol  = locked ? '#4a3020' : '#f0c060';
  return `<svg class="ls-door-svg" viewBox="0 0 48 62" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="10" width="44" height="50" rx="18" ry="18" fill="${frameCol}"/>
    <rect x="7" y="15" width="34" height="45" rx="13" ry="13" fill="${innerCol}"/>
    ${beaten ? '<text x="24" y="40" text-anchor="middle" font-size="18" fill="#88ff66">✓</text>' : ''}
    <circle cx="36" cy="36" r="3.5" fill="${knobCol}"/>
  </svg>`;
}

function buildLevelSelect() {
  const defs = makeLevels();
  const path = document.getElementById('lsPath');
  const cvs  = document.getElementById('lsPathCanvas');
  path.innerHTML = '';
  path.appendChild(cvs); // keep canvas

  const vw = window.innerWidth;
  const COLS = 5;
  const ROW_H = 130;
  const NODE_W = 70;
  const rows = Math.ceil(defs.length / COLS);
  const totalH = rows * ROW_H + 60;

  path.style.height = totalH + 'px';
  cvs.width = vw;
  cvs.height = totalH;

  // compute node positions in snake pattern (like Level Devil)
  const positions = [];
  const padX = (vw - COLS * NODE_W) / (COLS + 1);
  for (let i = 0; i < defs.length; i++) {
    const row = Math.floor(i / COLS);
    const col = i % COLS;
    // snake: even rows go left→right, odd rows go right→left
    const dir = row % 2 === 0 ? col : (COLS - 1 - col);
    const x = padX + dir * (NODE_W + padX) + NODE_W / 2;
    const y = 40 + row * ROW_H;
    positions.push({x, y});
  }

  // draw connecting path on canvas
  const ctx2 = cvs.getContext('2d');
  ctx2.clearRect(0, 0, vw, totalH);
  ctx2.strokeStyle = '#5a2a00';
  ctx2.lineWidth = 8;
  ctx2.lineCap = 'round';
  ctx2.lineJoin = 'round';
  ctx2.setLineDash([14, 10]);
  ctx2.beginPath();
  positions.forEach((pt, i) => {
    if (i === 0) ctx2.moveTo(pt.x, pt.y + 30);
    else ctx2.lineTo(pt.x, pt.y + 30);
  });
  ctx2.stroke();
  // lighter line on top
  ctx2.strokeStyle = '#c8901a';
  ctx2.lineWidth = 4;
  ctx2.setLineDash([10, 14]);
  ctx2.stroke();
  ctx2.setLineDash([]);

  // create door nodes
  positions.forEach((pt, i) => {
    const unlocked = i <= maxUnlocked;
    const beaten = i < maxUnlocked;
    const locked = !unlocked;
    const node = document.createElement('div');
    node.className = 'ls-node' + (locked ? ' locked' : '') + (beaten ? ' beaten' : '');
    node.style.left = (pt.x - NODE_W/2) + 'px';
    node.style.top  = (pt.y - 10) + 'px';
    node.style.width = NODE_W + 'px';
    node.innerHTML = doorSVG(beaten, locked) +
      `<div class="ls-node-num">${beaten ? '✓ ' : ''}${i+1}</div>`;
    if (unlocked) {
      node.addEventListener('click', () => {
        hideLevelSelect();
        startFromLevel(i);
      });
    }
    path.appendChild(node);
  });

  // scroll to show current level
  const cur = Math.min(maxUnlocked, defs.length - 1);
  const curY = positions[cur].y;
  setTimeout(() => {
    document.getElementById('lsScroll').scrollTop = Math.max(0, curY - 200);
  }, 50);
}

function showLevelSelect() {
  document.getElementById('pauseBtn').style.display = 'none';
  document.getElementById('levelSelectOverlay').style.display = 'flex';
  buildLevelSelect();
}

document.getElementById('lsResetBtn').addEventListener('click', () => {
  const confirm = document.getElementById('lsResetConfirm');
  confirm.style.display = 'flex';
});
document.getElementById('lsResetConfirmNo').addEventListener('click', () => {
  document.getElementById('lsResetConfirm').style.display = 'none';
});
document.getElementById('lsResetConfirmYes').addEventListener('click', () => {
  maxUnlocked = 0;
  saveProgress();
  document.getElementById('lsResetConfirm').style.display = 'none';
  buildLevelSelect(); // rebuild to show all locked
});

function hideLevelSelect() {
  document.getElementById('levelSelectOverlay').style.display = 'none';
}

// ─── pause ────────────────────────────────────────────────────────────────────
let paused = false;

function setPaused(val) {
  paused = val;
  document.getElementById('pauseOverlay').style.display = val ? 'flex' : 'none';
}

document.addEventListener('keydown', e => {
  if (e.code === 'Escape' && gameActive) {
    setPaused(!paused);
  }
});
document.getElementById('pauseBtn').addEventListener('click', () => setPaused(true));
document.getElementById('pauseResumeBtn').addEventListener('click', () => setPaused(false));
document.getElementById('pauseLevelsBtn').addEventListener('click', () => {
  setPaused(false);
  gameActive = false;
  document.getElementById('pauseBtn').style.display = 'none';
  showLevelSelect();
});
document.getElementById('pauseRestartBtn').addEventListener('click', () => {
  setPaused(false);
  loadLevel(curLevel);
});

function startFromLevel(idx) {
  curLevel = idx; totalDeaths = 0;
  document.getElementById('deathNum').textContent = '0';
  hideLevelSelect();
  document.getElementById('startOverlay').style.display = 'none';
  const label = 'LEVEL ' + (idx + 1);
  doTransition(label, () => {
    document.getElementById('pauseBtn').style.display = 'flex';
    loadLevel(idx);
    gameActive = true;
    loop();
  });
}

// patch showWin to save progress
const _origShowWin = showWin;
window.showWin = function() {
  markLevelBeaten(curLevel - 1);
  _origShowWin();
};

// ─── custom cursor (keyboard only — WASD/arrows move, Space clicks) ──────────
(function() {
  // Hide real system cursor
  document.documentElement.style.cursor = 'none';
  document.addEventListener('mousemove', () => {
    document.documentElement.style.cursor = 'none';
  });

  const cur = document.createElement('div');
  cur.id = 'customCursor';
  cur.style.cssText = `
    position:fixed; width:20px; height:20px; z-index:99999;
    pointer-events:none;
    left:0; top:0;
  `;
  cur.innerHTML = `<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
    <polygon points="2,1 2,17 6,12 9,19 12,18 9,11 15,11" fill="#f0c060" stroke="#3a0500" stroke-width="1.5"/>
  </svg>`;
  document.body.appendChild(cur);

  let cx = window.innerWidth / 2;
  let cy = window.innerHeight / 2;
  const held = {};
  // acceleration-based movement for smooth feel
  let vx = 0, vy = 0;
  const ACCEL = 1.8, FRICTION = 0.72, MAX = 18;

  document.addEventListener('keydown', e => { held[e.code] = true; });
  document.addEventListener('keyup',   e => { held[e.code] = false; });

  function menuActive() {
    const start  = document.getElementById('startOverlay');
    const ls     = document.getElementById('levelSelectOverlay');
    const pause  = document.getElementById('pauseOverlay');
    const win    = document.getElementById('winOverlay');
    return (start  && start.style.display  !== 'none') ||
           (ls     && ls.style.display     !== 'none') ||
           (pause  && pause.style.display  === 'flex') ||
           (win    && win.style.display    !== 'none' && win.style.display !== '');
  }

  const isTouchDevice = () => ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  function tick() {
    // always show custom cursor, always move with keys
    if (held['ArrowLeft']  || held['KeyA']) vx -= ACCEL;
    if (held['ArrowRight'] || held['KeyD']) vx += ACCEL;
    if (held['ArrowUp']    || held['KeyW']) vy -= ACCEL;
    if (held['ArrowDown']  || held['KeyS']) vy += ACCEL;
    vx *= FRICTION; vy *= FRICTION;
    vx = Math.max(-MAX, Math.min(MAX, vx));
    vy = Math.max(-MAX, Math.min(MAX, vy));
    cx += vx; cy += vy;
    cx = Math.max(0, Math.min(window.innerWidth  - 2, cx));
    cy = Math.max(0, Math.min(window.innerHeight - 2, cy));
    cur.style.left = cx + 'px';
    cur.style.top  = cy + 'px';
    // hide cursor on touch/mobile devices entirely
    if (isTouchDevice()) {
      cur.style.display = 'none';
    } else {
      cur.style.display = (!gameActive || menuActive()) ? 'block' : 'none';
    }
    requestAnimationFrame(tick);
  }
  tick();

  // Space = click element under cursor (works on menus AND pause)
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && (!gameActive || menuActive())) {
      e.preventDefault();
      cur.style.display = 'none';
      // walk up the DOM to find a clickable ancestor
      let el = document.elementFromPoint(cx + 4, cy + 10);
      cur.style.display = 'block';
      while (el && el !== document.body) {
        if (el.tagName === 'BUTTON' || el.classList.contains('ls-node') ||
            el.classList.contains('pause-btn') || el.classList.contains('btn')) {
          el.click();
          break;
        }
        el = el.parentElement;
      }
    }
  });

  // Mouse moves cursor too
  document.addEventListener('mousemove', e => { cx = e.clientX; cy = e.clientY; vx = 0; vy = 0; });
})();

// ─── start ────────────────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('startOverlay').style.display = 'none';
  showLevelSelect();
});

document.getElementById('lsBackBtn').addEventListener('click', () => {
  hideLevelSelect();
  document.getElementById('startOverlay').style.display = 'flex';
});

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('winOverlay').style.display = 'none';
  showLevelSelect();
});
// ─── mobile / touch support ───────────────────────────────────────────────────
(function() {
  const isMobile = () => ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  // Show mobile controls during gameplay
  function updateMobileControls() {
    const mc = document.getElementById('mobileControls');
    if (isMobile() && gameActive && !paused) {
      mc.classList.add('active');
    } else {
      mc.classList.remove('active');
    }
  }
  setInterval(updateMobileControls, 200);

  // Button touch → inject into K object
  function bindBtn(id, code) {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('touchstart', e => { e.preventDefault(); K[code] = true; },  {passive:false});
    el.addEventListener('touchend',   e => { e.preventDefault(); K[code] = false; }, {passive:false});
    el.addEventListener('touchcancel',e => { e.preventDefault(); K[code] = false; }, {passive:false});
  }
  bindBtn('btnLeft',  'ArrowLeft');
  bindBtn('btnRight', 'ArrowRight');
  bindBtn('btnJump',  'Space');

  // Scale canvas to fit mobile screen while keeping aspect ratio
  function scaleCanvas() {
    if (!isMobile()) return;
    const c = document.getElementById('c');
    const scaleX = window.innerWidth / 600;
    const scaleY = (window.innerHeight - 140) / 360; // leave room for controls
    const scale = Math.min(scaleX, scaleY);
    c.style.width  = (600 * scale) + 'px';
    c.style.height = (360 * scale) + 'px';
    // also scale HUD
    const hud = document.getElementById('hud');
    hud.style.width = (600 * scale) + 'px';
  }
  scaleCanvas();
  window.addEventListener('resize', scaleCanvas);

  // Touch on menus = tap to click (for start/level select on mobile)
  // The level select doors and buttons respond to touch natively via click events
  // Just make sure overlays respond to touch
  document.addEventListener('touchstart', e => {
    // update cursor position to touch point for Space-click compatibility
    if (e.touches.length > 0) {
      const t = e.touches[0];
      // fire a synthetic click on whatever was touched in menu screens
      const startOv = document.getElementById('startOverlay');
      const lsOv    = document.getElementById('levelSelectOverlay');
      const winOv   = document.getElementById('winOverlay');
      const pauseOv = document.getElementById('pauseOverlay');
      const onMenu  = [startOv, lsOv, winOv, pauseOv].some(el =>
        el && el.style.display !== 'none' && el.style.display !== ''
      );
      if (onMenu) {
        // let native touch->click handle it — no extra action needed
      }
    }
  }, {passive:true});
})();
</script>
